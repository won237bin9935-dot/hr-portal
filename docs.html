<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>文件宣導 — 華美光學人資系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-bg: #ffffff;
      --accent: #f56a6a;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text-dark: #3d4449;
      --text-mid: #666;
      --text-light: #999;
      --border: #e8e8e8;
      --sidebar-width: 260px;
      --docs-color: #0891b2;
      --docs-light: #e0f7fa;
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text-dark); display: flex; min-height: 100vh; }

    #sidebar { width:var(--sidebar-width); background:var(--sidebar-bg); border-right:1px solid var(--sidebar-border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; transition:transform .3s; }
    .sidebar-header { padding:28px 24px 20px; border-bottom:1px solid var(--sidebar-border); display:flex; align-items:center; }
    .logo-icon { width:40px; height:40px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .logo-text { color:var(--text-dark); font-size:15px; font-weight:700; line-height:1.3; margin-left:12px; }
    .logo-sub { color:var(--text-light); font-size:11px; display:block; margin-top:2px; }
    #sidebar-close { display:none; background:none; border:none; color:var(--text-light); font-size:22px; cursor:pointer; margin-left:auto; }
    nav { flex:1; overflow-y:auto; padding:16px 0; }
    .nav-section-label { color:var(--sidebar-label); font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:16px 24px 6px; }
    .nav-item { display:flex; align-items:center; gap:12px; padding:11px 24px; color:var(--sidebar-text); border-left:3px solid transparent; transition:all .18s; font-size:14px; text-decoration:none; }
    .nav-item:hover { background:var(--sidebar-hover-bg); color:var(--accent); }
    .nav-item.active { background:var(--sidebar-active-bg); border-left-color:var(--accent); color:var(--accent); font-weight:700; }
    .nav-item .icon { font-size:17px; width:22px; text-align:center; flex-shrink:0; }
    .sidebar-footer { padding:16px 24px; border-top:1px solid var(--sidebar-border); color:var(--sidebar-label); font-size:11px; }

    #main { margin-left:var(--sidebar-width); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    .topbar { background:var(--card-bg); border-bottom:1px solid var(--border); padding:0 32px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .topbar-title { font-size:16px; font-weight:700; }
    .breadcrumb { font-size:12px; color:var(--text-light); }
    .breadcrumb a { color:var(--text-light); text-decoration:none; }
    .topbar-avatar { width:34px; height:34px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; }
    .menu-toggle { display:none; background:none; border:none; font-size:22px; cursor:pointer; color:var(--text-dark); }
    .content { padding:32px; flex:1; }

    /* Hero */
    .docs-hero {
      background: linear-gradient(135deg, #0369a1 0%, #0891b2 50%, #06b6d4 100%);
      border-radius: 16px;
      padding: 18px 32px;
      margin-bottom: 28px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .docs-hero::before { content:''; position:absolute; right:-60px; top:-60px; width:240px; height:240px; border-radius:50%; background:rgba(255,255,255,.06); }
    .hero-text h1 { font-size:26px; font-weight:900; margin-bottom:6px; }
    .hero-text p { font-size:14px; opacity:.8; line-height:1.7; }
    .hero-icon { font-size:72px; opacity:.2; position:absolute; right:40px; top:50%; transform:translateY(-50%); }

    /* Filter bar */
    .filter-bar { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
    .filter-bar h2 { font-size:15px; font-weight:700; color:#666; margin-right:4px; }
    .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; }
    .tab { padding:6px 16px; border-radius:30px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:var(--card-bg); color:var(--text-mid); transition:all .18s; }
    .tab:hover { border-color:var(--docs-color); color:var(--docs-color); }
    .tab.active { background:var(--docs-color); border-color:var(--docs-color); color:#fff; }

    /* Docs grid */
    .docs-grid { display:flex; flex-direction:row; flex-wrap:wrap; gap:16px; width:100%; }

    .doc-card {
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
      transition: all .2s;
      display: flex;
      flex-direction: column;
      width: 290px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      display: inline-flex;
      flex-direction: column;
    }
    .doc-card:hover { box-shadow:0 6px 24px rgba(0,0,0,.09); transform:translateY(-2px); }

    /* Image preview */
    .doc-preview {
      width: 100%;
      min-height: 120px;
      background: var(--docs-light);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .doc-preview img { width:100%; height:auto; object-fit:contain; display:block; }
    .doc-preview.no-img { background: linear-gradient(135deg, #e0f7fa, #b2ebf2); }
    .doc-preview-icon { font-size:48px; opacity:.5; }
    .doc-format-badge {
      position: absolute;
      top: 10px; right: 10px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .fmt-pdf { background:#ff6b6b; color:#fff; }
    .fmt-jpg, .fmt-png, .fmt-jpeg { background:#06b6d4; color:#fff; }
    .fmt-word, .fmt-docx { background:#2563eb; color:#fff; }
    .fmt-default { background:#888; color:#fff; }

    /* Card body */
    .doc-card-body { padding:16px 18px; flex:1; display:flex; flex-direction:column; }
    .doc-category { font-size:11px; font-weight:700; color:var(--docs-color); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
    .doc-title { font-size:15px; font-weight:800; margin-bottom:6px; line-height:1.4; }
    .doc-desc { font-size:13px; color:var(--text-mid); line-height:1.6; margin-bottom:12px; flex:1; }
    .doc-meta { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid var(--border); }
    .doc-date { font-size:11px; color:var(--text-light); }
    .btn-doc {
      display:inline-flex; align-items:center; gap:6px;
      background:var(--docs-color); color:#fff;
      font-size:12px; font-weight:700;
      padding:6px 14px; border-radius:20px;
      text-decoration:none; transition:all .18s;
    }
    .btn-doc:hover { background:#0369a1; }
    .btn-sign { display:block; margin-top:10px; text-align:center; background:#fff5f5; color:var(--accent); border:1.5px solid var(--accent); font-size:13px; font-weight:700; padding:8px; border-radius:8px; text-decoration:none; transition:all .18s; }
    .btn-sign:hover { background:var(--accent); color:#fff; }

    /* Loading & empty */
    .loading { text-align:center; padding:60px; color:var(--text-light); }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--docs-color); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty-state { text-align:center; padding:48px; color:var(--text-light); grid-column:1/-1; }
    .empty-state .ei { font-size:48px; display:block; margin-bottom:12px; }

    #sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:99; }

    
    @media (max-width:900px) { #sidebar{transform:translateX(-100%)} #sidebar.open{transform:translateX(0)} #sidebar-close{display:block} #main{margin-left:0} .menu-toggle{display:block} .doc-card{width:calc(50% - 8px)} }
    @media (max-width:560px) { .content{padding:20px 16px} .doc-card{width:100%} .hero-icon{display:none} .docs-hero{padding:24px} }
  </style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">🏢</div>
    <div class="logo-text">華美光學<span class="logo-sub">人資入口網站</span></div>
    <button onclick="toggleSidebar()" id="sidebar-close">✕</button>
  </div>
  <nav>
    <div class="nav-section-label">主選單</div>
    <a class="nav-item" href="home.html"><span class="icon">🏠</span> 首頁總覽</a>
    <div class="nav-section-label">學習與測驗</div>
    <a class="nav-item" href="quiz.html"><span class="icon">📝</span> 測驗專區</a>
    <a class="nav-item" href="#"><span class="icon">🎓</span> 教育訓練</a>
    <div class="nav-section-label">資料與公告</div>
    <a class="nav-item active" href="docs.html"><span class="icon">📁</span> 文件宣導</a>
    <a class="nav-item" href="events-list.html"><span class="icon">🎉</span> 活動報名</a>
    <a class="nav-item" href="#"><span class="icon">📢</span> 最新公告</a>
    <div class="nav-section-label">系統整合</div>
    <a class="nav-item" href="#"><span class="icon">🔗</span> 相關系統連結</a>
  </nav>
  <div class="sidebar-footer">© 2025 華美光學　人資部</div>
</aside>

<div id="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div>
        <div class="topbar-title">文件宣導</div>
        <div class="breadcrumb"><a href="home.html">首頁</a> › 文件宣導</div>
      </div>
    </div>
    <div class="topbar-avatar">HR</div>
  </header>

  <main class="content">

    <div class="docs-hero">
      <div class="hero-text">
        <h1>📁 文件宣導</h1>
        <p>公司政策、法規宣導、表單下載及宣傳圖片，所有重要文件一站查閱。</p>
      </div>
      <div class="hero-icon">📄</div>
    </div>

    <div class="filter-bar">
      <h2>所有文件</h2>
      <div class="filter-tabs" id="category-tabs">
        <div class="tab active" onclick="filterDocs('all',this)">全部</div>
      </div>
    </div>

    <div id="docs-loading" class="loading">
      <div class="spinner"></div>
      <p>載入文件資料中…</p>
    </div>

    <div class="docs-grid" id="docs-grid"></div>

  </main>
</div>

<script src="sheets-config.js"></script>
<script>
  function toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebar-overlay');
    const c = document.getElementById('sidebar-close');
    const open = s.classList.toggle('open');
    o.style.display = open ? 'block' : 'none';
    c.style.display = open ? 'block' : 'none';
  }

  let allDocs = [];

  async function loadDocs() {
    const rows = await fetchSheet(HRCONFIG.SHEETS.DOCS);
    allDocs = rows.filter(r => r['文件名稱']);

    // 動態產生分類標籤
    const categories = [...new Set(allDocs.map(d => d['分類']).filter(Boolean))];
    const tabsEl = document.getElementById('category-tabs');
    categories.forEach(cat => {
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.textContent = cat;
      tab.onclick = function() { filterDocs(cat, this); };
      tabsEl.appendChild(tab);
    });

    document.getElementById('docs-loading').style.display = 'none';
    renderDocs('all');
  }

  function renderDocs(filter) {
    const grid = document.getElementById('docs-grid');
    grid.innerHTML = '';
    const filtered = filter === 'all' ? allDocs : allDocs.filter(d => d['分類'] === filter);

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty-state"><span class="ei">📁</span><p>目前沒有文件</p></div>`;
      return;
    }

    filtered.forEach(d => grid.appendChild(buildDocCard(d)));
  }

  function buildDocCard(d) {
    const fmt = (d['檔案格式'] || '').toUpperCase();
    const isImg = ['JPG','JPEG','PNG','GIF'].includes(fmt);
    const fmtClass = fmt === 'PDF' ? 'fmt-pdf'
                   : ['JPG','JPEG','PNG'].includes(fmt) ? 'fmt-jpg'
                   : ['WORD','DOCX'].includes(fmt) ? 'fmt-word'
                   : 'fmt-default';

    const card = document.createElement('div');
    card.className = 'doc-card';

    const previewHTML = isImg && d['檔案連結']
      ? `<div class="doc-preview">
           <img src="${d['檔案連結']}" alt="${d['文件名稱']}" onerror="this.parentElement.classList.add('no-img');this.remove()">
           <span class="doc-format-badge ${fmtClass}">${fmt}</span>
         </div>`
      : `<div class="doc-preview no-img">
           <span class="doc-preview-icon">${fmt === 'PDF' ? '📄' : fmt === 'DOCX' || fmt === 'WORD' ? '📝' : '📁'}</span>
           <span class="doc-format-badge ${fmtClass}">${fmt || '檔案'}</span>
         </div>`;

    card.innerHTML = `
      ${previewHTML}
      <div class="doc-card-body">
        ${d['分類'] ? `<div class="doc-category">${d['分類']}</div>` : ''}
        <div class="doc-title">${d['文件名稱']}</div>
        ${d['說明'] ? `<div class="doc-desc">${d['說明']}</div>` : '<div class="doc-desc"></div>'}
        <div class="doc-meta">
          <span class="doc-date">${d['上傳日期'] ? '📅 ' + d['上傳日期'] : ''}</span>
          ${d['檔案連結']
            ? `<a href="${d['檔案連結']}" target="_blank" class="btn-doc">⬇ 開啟</a>`
            : `<span style="font-size:12px;color:var(--text-light)">連結未設定</span>`}
        </div>
        ${(d['是否須回傳簽名'] || '').trim() === '是'
          ? `<a href="signature.html?doc=${encodeURIComponent(d['文件名稱'])}" class="btn-sign">✍️ 前往簽名</a>`
          : ''}
      </div>`;
    return card;
  }

  function filterDocs(filter, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderDocs(filter);
  }

  loadDocs();
</script>
</body>
</html>
