<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>最新公告 — 華美光學人資系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-bg: #2e3141;
      --accent: #f56a6a;
      --bg: #f5f4f0;
      --card-bg: #ffffff;
      --text-dark: #333;
      --text-mid: #666;
      --text-light: #999;
      --border: #e4e2de;
      --sidebar-width: 260px;
      --notice-color: #d97706;
      --notice-light: #fffbeb;
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text-dark); display: flex; min-height: 100vh; }

    #sidebar { width:var(--sidebar-width); background:var(--sidebar-bg); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; transition:transform .3s; }
    .sidebar-header { padding:28px 24px 20px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; }
    .logo-icon { width:40px; height:40px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .logo-text { color:#fff; font-size:15px; font-weight:700; line-height:1.3; margin-left:12px; }
    .logo-sub { color:rgba(255,255,255,.45); font-size:11px; display:block; margin-top:2px; }
    #sidebar-close { display:none; background:none; border:none; color:rgba(255,255,255,.5); font-size:22px; cursor:pointer; margin-left:auto; }
    nav { flex:1; overflow-y:auto; padding:16px 0; }
    .nav-section-label { color:rgba(255,255,255,.3); font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:16px 24px 6px; }
    .nav-item { display:flex; align-items:center; gap:12px; padding:11px 24px; color:rgba(255,255,255,.65); border-left:3px solid transparent; transition:all .18s; font-size:14px; text-decoration:none; }
    .nav-item:hover { background:rgba(255,255,255,.06); color:#fff; }
    .nav-item.active { background:rgba(245,106,106,.12); border-left-color:var(--accent); color:#fff; }
    .nav-item .icon { font-size:17px; width:22px; text-align:center; flex-shrink:0; }
    .sidebar-footer { padding:16px 24px; border-top:1px solid rgba(255,255,255,.08); color:rgba(255,255,255,.3); font-size:11px; }

    #main { margin-left:var(--sidebar-width); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    .topbar { background:var(--card-bg); border-bottom:1px solid var(--border); padding:0 32px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .topbar-title { font-size:16px; font-weight:700; }
    .breadcrumb { font-size:12px; color:var(--text-light); }
    .breadcrumb a { color:var(--text-light); text-decoration:none; }
    .topbar-avatar { width:34px; height:34px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; }
    .menu-toggle { display:none; background:none; border:none; font-size:22px; cursor:pointer; color:var(--text-dark); }
    .content { padding:32px; flex:1; }

    /* Hero */
    .notice-hero {
      background: linear-gradient(135deg, #92400e 0%, #d97706 50%, #f59e0b 100%);
      border-radius: 20px;
      padding: 36px 40px;
      margin-bottom: 28px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .notice-hero::before { content:''; position:absolute; right:-60px; top:-60px; width:240px; height:240px; border-radius:50%; background:rgba(255,255,255,.06); }
    .hero-text h1 { font-size:26px; font-weight:900; margin-bottom:6px; }
    .hero-text p { font-size:14px; opacity:.8; line-height:1.7; }
    .hero-icon { font-size:72px; opacity:.2; position:absolute; right:40px; top:50%; transform:translateY(-50%); }

    /* Filter */
    .filter-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px; }
    .filter-bar h2 { font-size:16px; font-weight:700; }
    .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; }
    .tab { padding:6px 16px; border-radius:30px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:var(--card-bg); color:var(--text-mid); transition:all .18s; }
    .tab:hover { border-color:var(--notice-color); color:var(--notice-color); }
    .tab.active { background:var(--notice-color); border-color:var(--notice-color); color:#fff; }

    /* Notice list */
    .notice-list { display:flex; flex-direction:column; gap:12px; }

    .notice-card {
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 20px 24px;
      transition: all .2s;
      cursor: pointer;
      border-left: 4px solid var(--border);
    }
    .notice-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); transform:translateX(4px); }
    .notice-card.urgent { border-left-color:#ef4444; }
    .notice-card.important { border-left-color:var(--notice-color); }
    .notice-card.normal { border-left-color:#60a5fa; }

    .notice-card-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
    .notice-badge { padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .badge-urgent { background:#fee2e2; color:#ef4444; }
    .badge-important { background:#fef3c7; color:#d97706; }
    .badge-normal { background:#dbeafe; color:#2563eb; }
    .notice-unit { font-size:12px; color:var(--text-light); }
    .notice-date { font-size:12px; color:var(--text-light); margin-left:auto; }

    .notice-title { font-size:16px; font-weight:800; margin-bottom:8px; line-height:1.4; }
    .notice-content { font-size:14px; color:var(--text-mid); line-height:1.7; }
    .notice-attachment { margin-top:12px; }
    .btn-attach { display:inline-flex; align-items:center; gap:6px; background:var(--notice-light); color:var(--notice-color); border:1px solid var(--notice-color); font-size:12px; font-weight:600; padding:5px 14px; border-radius:20px; text-decoration:none; transition:all .18s; }
    .btn-attach:hover { background:var(--notice-color); color:#fff; }

    /* Expand/collapse */
    .notice-card .notice-content { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .notice-card.expanded .notice-content { display:block; }
    .expand-btn { margin-top:8px; font-size:12px; color:var(--notice-color); cursor:pointer; font-weight:600; }

    /* Loading & empty */
    .loading { text-align:center; padding:60px; color:var(--text-light); }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--notice-color); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty-state { text-align:center; padding:48px; color:var(--text-light); }
    .empty-state .ei { font-size:48px; display:block; margin-bottom:12px; }

    #sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:99; }

    @media (max-width:900px) { #sidebar{transform:translateX(-100%)} #sidebar.open{transform:translateX(0)} #sidebar-close{display:block} #main{margin-left:0} .menu-toggle{display:block} }
    @media (max-width:560px) { .content{padding:20px 16px} .hero-icon{display:none} .notice-hero{padding:24px} }
  </style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">🏢</div>
    <div class="logo-text">華美光學<span class="logo-sub">人資入口網站</span></div>
    <button onclick="toggleSidebar()" id="sidebar-close">✕</button>
  </div>
  <nav>
    <div class="nav-section-label">主選單</div>
    <a class="nav-item" href="home.html"><span class="icon">🏠</span> 首頁總覽</a>
    <div class="nav-section-label">學習與測驗</div>
    <a class="nav-item" href="quiz.html"><span class="icon">📝</span> 測驗專區</a>
    <a class="nav-item" href="#"><span class="icon">🎓</span> 教育訓練</a>
    <div class="nav-section-label">資料與公告</div>
    <a class="nav-item" href="docs.html"><span class="icon">📁</span> 文件宣導</a>
    <a class="nav-item" href="events-list.html"><span class="icon">🎉</span> 活動報名</a>
    <a class="nav-item active" href="notice.html"><span class="icon">📢</span> 最新公告</a>
    <div class="nav-section-label">系統整合</div>
    <a class="nav-item" href="links.html"><span class="icon">🔗</span> 相關系統連結</a>
  </nav>
  <div class="sidebar-footer">© 2025 華美光學　人資部</div>
</aside>

<div id="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div>
        <div class="topbar-title">最新公告</div>
        <div class="breadcrumb"><a href="home.html">首頁</a> › 最新公告</div>
      </div>
    </div>
    <div class="topbar-avatar">HR</div>
  </header>

  <main class="content">
    <div class="notice-hero">
      <div class="hero-text">
        <h1>📢 最新公告</h1>
        <p>人資部門最新消息、重要通知及政策公告，<br>請定期查閱以免錯過重要資訊。</p>
      </div>
      <div class="hero-icon">📣</div>
    </div>

    <div class="filter-bar">
      <h2>所有公告</h2>
      <div class="filter-tabs">
        <div class="tab active" onclick="filterNotice('all',this)">全部</div>
        <div class="tab" onclick="filterNotice('緊急',this)">緊急</div>
        <div class="tab" onclick="filterNotice('重要',this)">重要</div>
        <div class="tab" onclick="filterNotice('一般',this)">一般</div>
      </div>
    </div>

    <div id="notice-loading" class="loading">
      <div class="spinner"></div>
      <p>載入公告資料中…</p>
    </div>

    <div class="notice-list" id="notice-list"></div>

  </main>
</div>

<script src="sheets-config.js"></script>
<script>
  function toggleSidebar() {
    const s = document.getElementById('sidebar');
    const o = document.getElementById('sidebar-overlay');
    const c = document.getElementById('sidebar-close');
    const open = s.classList.toggle('open');
    o.style.display = open ? 'block' : 'none';
    c.style.display = open ? 'block' : 'none';
  }

  let allNotices = [];

  async function loadNotices() {
    const rows = await fetchSheet(HRCONFIG.SHEETS.NOTICE);
    allNotices = rows.filter(r => r['公告標題']);
    document.getElementById('notice-loading').style.display = 'none';
    renderNotices('all');
  }

  function renderNotices(filter) {
    const list = document.getElementById('notice-list');
    list.innerHTML = '';
    const filtered = filter === 'all' ? allNotices : allNotices.filter(n => n['重要程度'] === filter);

    if (filtered.length === 0) {
      list.innerHTML = `<div class="empty-state"><span class="ei">📢</span><p>目前沒有公告</p></div>`;
      return;
    }

    filtered.forEach(n => list.appendChild(buildNoticeCard(n)));
  }

  function buildNoticeCard(n) {
    const level = n['重要程度'] || '一般';
    const levelCls = level === '緊急' ? 'urgent' : level === '重要' ? 'important' : 'normal';
    const badgeCls = level === '緊急' ? 'badge-urgent' : level === '重要' ? 'badge-important' : 'badge-normal';
    const levelIcon = level === '緊急' ? '🚨' : level === '重要' ? '⚠️' : '📌';

    const card = document.createElement('div');
    card.className = `notice-card ${levelCls}`;
    card.dataset.level = level;

    card.innerHTML = `
      <div class="notice-card-top">
        <span class="notice-badge ${badgeCls}">${levelIcon} ${level}</span>
        ${n['發布單位'] ? `<span class="notice-unit">📌 ${n['發布單位']}</span>` : ''}
        ${n['發布日期'] ? `<span class="notice-date">${n['發布日期']}</span>` : ''}
      </div>
      <div class="notice-title">${n['公告標題']}</div>
      ${n['公告內容'] ? `
        <div class="notice-content">${n['公告內容']}</div>
        <div class="expand-btn" onclick="toggleExpand(this)">展開全文 ▼</div>
      ` : ''}
      ${n['附件連結'] ? `
        <div class="notice-attachment">
          <a href="${n['附件連結']}" target="_blank" class="btn-attach">📎 查看附件</a>
        </div>` : ''}`;
    return card;
  }

  function toggleExpand(btn) {
    const card = btn.closest('.notice-card');
    card.classList.toggle('expanded');
    btn.textContent = card.classList.contains('expanded') ? '收起 ▲' : '展開全文 ▼';
  }

  function filterNotice(filter, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderNotices(filter);
  }

  loadNotices();
</script>
</body>
</html>
