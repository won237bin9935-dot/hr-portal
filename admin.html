<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>後台管理 — 華美光學人資系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-wrap { display: flex; min-height: 100vh; }

    /* 左側選單 */
    .admin-sidebar {
      width: 220px;
      background: #fff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      box-shadow: 2px 0 8px rgba(0,0,0,.06);
      transition: transform .3s ease;
    }
    .admin-sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .admin-sidebar-header .title { font-size: 15px; font-weight: 800; color: var(--text-dark); }
    .admin-sidebar-header .subtitle { font-size: 11px; color: var(--text-light); margin-top: 2px; }
    .admin-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
    .admin-nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-mid);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all .15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }
    .admin-nav-item:hover { color: var(--accent); background: var(--accent-light); }
    .admin-nav-item.active {
      color: var(--accent);
      background: var(--accent-light);
      border-left: 3px solid var(--accent);
      font-weight: 700;
    }
    .admin-nav-item .icon { font-size: 17px; width: 22px; text-align: center; flex-shrink: 0; }
    .admin-sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--text-light);
    }
    .admin-logout-btn {
      margin-top: 8px;
      width: 100%;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px;
      font-size: 12px;
      color: var(--text-mid);
      cursor: pointer;
      font-family: inherit;
      transition: all .15s;
    }
    .admin-logout-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* 主內容 */
    .admin-main {
      margin-left: 220px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: var(--bg);
    }
    .admin-topbar {
      height: 56px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 50;
      gap: 12px;
    }
    .admin-topbar-title { font-size: 16px; font-weight: 800; color: var(--text-dark); }
    .admin-topbar-back {
      margin-left: auto;
      font-size: 13px;
      color: var(--text-light);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color .15s;
    }
    .admin-topbar-back:hover { color: var(--accent); }
    .admin-content { padding: 28px 32px; flex: 1; }

    /* 登入畫面 */
    #login-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,.10);
    }
    .login-card .logo { font-size: 48px; margin-bottom: 16px; }
    .login-card h2 { font-size: 20px; font-weight: 800; margin-bottom: 6px; color: var(--text-dark); }
    .login-card p { font-size: 13px; color: var(--text-light); margin-bottom: 24px; }
    .login-card input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 10px;
      outline: none;
      font-family: inherit;
      transition: border-color .2s;
    }
    .login-card input[type="password"]:focus { border-color: var(--accent); }
    #login-error { color: var(--accent); font-size: 13px; margin-bottom: 10px; display: none; }
    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s;
    }
    .login-btn:hover { background: var(--accent-hover); }

    /* 面板 */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    .panel-header {
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .panel-header h2 { font-size: 20px; font-weight: 800; color: var(--text-dark); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .coming-soon-box {
      background: #fff;
      border-radius: 14px;
      border: 2px dashed var(--border);
      padding: 60px;
      text-align: center;
      color: var(--text-light);
    }
    .coming-soon-box .cs-icon { font-size: 48px; margin-bottom: 14px; }
    .coming-soon-box p { font-size: 14px; }

    /* 手機版 */
    .admin-menu-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text-dark);
    }
    #admin-sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.3);
      z-index: 99;
    }
    @media (max-width: 900px) {
      .admin-sidebar { transform: translateX(-100%); }
      .admin-sidebar.open { transform: translateX(0); box-shadow: 4px 0 20px rgba(0,0,0,.15); }
      .admin-main { margin-left: 0; }
      .admin-menu-toggle { display: block; }
      .admin-content { padding: 20px 16px; }
      .coming-soon-box { padding: 40px 20px; }
    }
  </style>
</head>
<body>

<!-- 登入畫面 -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">⚙️</div>
    <h2>後台管理系統</h2>
    <p>請輸入後台管理密碼</p>
    <input type="password" id="login-pwd" placeholder="請輸入密碼"
      onkeydown="if(event.key==='Enter')adminLogin()" />
    <p id="login-error"></p>
    <button class="login-btn" onclick="adminLogin()">確認</button>
  </div>
</div>

<!-- 後台主介面 -->
<div id="admin-app" style="display:none; width:100%;">
  <div id="admin-sidebar-overlay" onclick="toggleAdminSidebar()"></div>
  <div class="admin-sidebar" id="admin-sidebar">
    <div class="admin-sidebar-header">
      <div class="title">⚙️ 後台管理</div>
      <div class="subtitle">華美光學人資系統</div>
    </div>
    <nav class="admin-nav">
      <button class="admin-nav-item active" onclick="showPanel('notice', this)">
        <span class="icon">📢</span> 公告管理
      </button>
      <button class="admin-nav-item" onclick="showPanel('events', this)">
        <span class="icon">📅</span> 活動管理
      </button>
      <button class="admin-nav-item" onclick="showPanel('docs', this)">
        <span class="icon">📄</span> 文件宣導
      </button>
      <button class="admin-nav-item" onclick="showPanel('quiz', this)">
        <span class="icon">📝</span> 測驗管理
      </button>
      <button class="admin-nav-item" onclick="showPanel('links', this)">
        <span class="icon">🔗</span> 統計連結
      </button>
      <div style="margin:12px 20px 4px;border-top:1px solid var(--border);padding-top:12px;font-size:11px;color:var(--text-light);">── 前台選單現況 ──</div>
      <div id="admin-nav-preview"></div>
    </nav>
    <div class="admin-sidebar-footer">
      <button class="admin-logout-btn" onclick="adminLogout()">🚪 登出後台</button>
    </div>
  </div>

  <div class="admin-main">
    <div class="admin-topbar">
      <button class="admin-menu-toggle" onclick="toggleAdminSidebar()">☰</button>
      <div class="admin-topbar-title" id="admin-topbar-title">📢 公告管理</div>
      <a class="admin-topbar-back" href="home.html">← 回到員工網站</a>
    </div>
    <div class="admin-content">

      <div class="admin-panel active" id="panel-notice">
        <div class="panel-header">
          <h2>📢 公告管理</h2>
          <button class="btn-primary">＋ 新增公告</button>
        </div>
        <div class="coming-soon-box">
          <div class="cs-icon">🚧</div>
          <p>公告管理功能開發中，即將上線</p>
        </div>
      </div>

      <div class="admin-panel" id="panel-events">
        <div class="panel-header">
          <h2>📅 活動管理</h2>
          <button class="btn-primary">＋ 新增活動</button>
        </div>
        <div class="coming-soon-box">
          <div class="cs-icon">🚧</div>
          <p>活動管理功能開發中，即將上線</p>
        </div>
      </div>

      <div class="admin-panel" id="panel-docs">
        <div class="panel-header">
          <h2>📄 文件宣導</h2>
          <button class="btn-primary">＋ 新增文件</button>
        </div>
        <div class="coming-soon-box">
          <div class="cs-icon">🚧</div>
          <p>文件宣導功能開發中，即將上線</p>
        </div>
      </div>

      <div class="admin-panel" id="panel-quiz">
        <div class="panel-header">
          <h2>📝 測驗管理</h2>
          <button class="btn-primary">＋ 新增測驗</button>
        </div>
        <div class="coming-soon-box">
          <div class="cs-icon">🚧</div>
          <p>測驗管理功能開發中，即將上線</p>
        </div>
      </div>

      <div class="admin-panel" id="panel-links">
        <div class="panel-header">
          <h2>🔗 統計連結管理</h2>
          <button class="btn-primary" onclick="openLinkForm()">＋ 新增連結</button>
        </div>

        <!-- 列表 -->
        <div id="links-loading-admin" style="text-align:center;padding:40px;color:var(--text-light);">
          <div style="width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:admin-spin .8s linear infinite;margin:0 auto 10px;"></div>
          <p style="font-size:13px;">載入中…</p>
        </div>
        <div id="links-table-wrap" style="display:none;">
          <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);">
              <thead>
                <tr style="background:#f8f9fa;border-bottom:2px solid var(--border);">
                  <th style="padding:12px 16px;text-align:left;font-size:13px;color:var(--text-mid);font-weight:700;">連結名稱</th>
                  <th style="padding:12px 16px;text-align:left;font-size:13px;color:var(--text-mid);font-weight:700;">說明</th>
                  <th style="padding:12px 16px;text-align:left;font-size:13px;color:var(--text-mid);font-weight:700;">連結網址</th>
                  <th style="padding:12px 16px;text-align:center;font-size:13px;color:var(--text-mid);font-weight:700;">狀態</th>
                  <th style="padding:12px 16px;text-align:center;font-size:13px;color:var(--text-mid);font-weight:700;">操作</th>
                </tr>
              </thead>
              <tbody id="links-tbody"></tbody>
            </table>
          </div>
          <div id="links-empty-admin" style="display:none;text-align:center;padding:40px;color:var(--text-light);">
            <div style="font-size:40px;margin-bottom:10px;">🔗</div>
            <p style="font-size:13px;">目前沒有連結，點擊上方「＋ 新增連結」新增</p>
          </div>
        </div>
      </div>

      <!-- 新增/編輯 Modal -->
      <div id="link-form-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;align-items:center;justify-content:center;">
        <div style="background:#fff;border-radius:16px;padding:36px;width:90%;max-width:480px;box-shadow:0 8px 40px rgba(0,0,0,.18);position:relative;max-height:90vh;overflow-y:auto;">
          <button onclick="closeLinkForm()" style="position:absolute;top:14px;right:18px;background:none;border:none;font-size:20px;cursor:pointer;color:#999;">✕</button>
          <h3 id="link-form-title" style="font-size:18px;font-weight:800;margin-bottom:24px;color:var(--text-dark);">＋ 新增連結</h3>
          <div style="display:flex;flex-direction:column;gap:16px;">
            <div>
              <label style="font-size:13px;font-weight:700;color:var(--text-mid);display:block;margin-bottom:6px;">連結名稱 *</label>
              <input type="text" id="lf-name" placeholder="例：內訓課程滿意度調查"
                style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:inherit;" />
            </div>
            <div>
              <label style="font-size:13px;font-weight:700;color:var(--text-mid);display:block;margin-bottom:6px;">說明</label>
              <input type="text" id="lf-desc" placeholder="選填，簡短說明用途"
                style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:inherit;" />
            </div>
            <div>
              <label style="font-size:13px;font-weight:700;color:var(--text-mid);display:block;margin-bottom:6px;">連結網址 *</label>
              <input type="url" id="lf-url" placeholder="https://..."
                style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:inherit;" />
            </div>
            <div>
              <label style="font-size:13px;font-weight:700;color:var(--text-mid);display:block;margin-bottom:6px;">狀態</label>
              <select id="lf-status" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;font-family:inherit;background:#fff;">
                <option value="開放中">開放中</option>
                <option value="已停用">已停用</option>
              </select>
            </div>
          </div>
          <p id="lf-error" style="color:var(--accent);font-size:13px;margin-top:12px;display:none;"></p>
          <div style="display:flex;gap:10px;margin-top:24px;">
            <button onclick="closeLinkForm()" style="flex:1;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;background:#fff;font-family:inherit;color:var(--text-mid);">取消</button>
            <button id="lf-submit" onclick="submitLinkForm()" style="flex:2;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">儲存</button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="sheets-config.js"></script>
<script>
const ADMIN_PWD = '@@69314511@@';
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxfo--2xa9vk6tlIzCjNyu3Y76AQIzYj-tM3XcvFQO72QwkWEqYIW_jSl2JRtE2tgql/exec';
let loginFailCount = 0;

// 頁面載入：檢查是否已登入
window.addEventListener('DOMContentLoaded', function() {
  if (sessionStorage.getItem('admin_auth') === 'true') {
    showApp();
  }
});

// 密碼驗證
function adminLogin() {
  const input = document.getElementById('login-pwd');
  const err = document.getElementById('login-error');
  const pwd = input.value.trim();
  input.value = '';

  if (pwd === ADMIN_PWD) {
    loginFailCount = 0;
    sessionStorage.setItem('admin_auth', 'true');
    err.style.display = 'none';
    showApp();
  } else {
    loginFailCount++;
    err.textContent = `密碼錯誤，請重試（第 ${loginFailCount} 次）`;
    err.style.display = 'block';
    input.focus();

    if (loginFailCount >= 3) {
      sendLoginAlert();
      err.textContent = '密碼錯誤次數過多，已通知管理員';
      loginFailCount = 0;
    }
  }
}

// 寄通知信
function sendLoginAlert() {
  try {
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action   : 'adminLoginAlert',
        userAgent: navigator.userAgent,
        time     : new Date().toLocaleString('zh-TW', { timeZone: 'Asia/Taipei' }),
      }),
    });
  } catch(e) {
    console.error('通知信發送失敗', e);
  }
}

// 顯示後台
function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-app').style.display = 'flex';
  loadFrontendMenuPreview();
}

// 讀取前台選單設定，顯示在後台左側供參考
async function loadFrontendMenuPreview() {
  try {
    const SHEET_ID = '1b4xq2XxSCbuIF6SZU-x0Jz4Du_n-YRAJCSQrkm2ze3U';
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('選單設定')}&headers=1`;
    const res = await fetch(url);
    const text = await res.text();
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!match) return;
    const json = JSON.parse(match[1]);

    const rows = json.table.rows
      .filter(r => r.c && r.c[0]?.v)
      .map(r => ({
        name  : r.c[1]?.v || '',
        icon  : r.c[2]?.v || '',
        show  : r.c[4]?.v === '是',
      }));

    const preview = document.getElementById('admin-nav-preview');
    preview.innerHTML = rows.map(r => `
      <div style="display:flex;align-items:center;gap:8px;padding:6px 20px;font-size:12px;color:${r.show ? '#3d4449' : '#ccc'};">
        <span>${r.icon}</span>
        <span>${r.name}</span>
        <span style="margin-left:auto;font-size:10px;padding:2px 6px;border-radius:10px;background:${r.show ? '#dcfce7' : '#f3f4f6'};color:${r.show ? '#16a34a' : '#999'};">${r.show ? '顯示' : '隱藏'}</span>
      </div>`).join('');
  } catch(e) {
    console.log('前台選單預覽讀取失敗');
  }
}

// 登出
function adminLogout() {
  sessionStorage.removeItem('admin_auth');
  document.getElementById('admin-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pwd').value = '';
  document.getElementById('login-error').style.display = 'none';
}

// 切換面板
const panelTitles = {
  notice: '📢 公告管理',
  events: '📅 活動管理',
  docs  : '📄 文件宣導',
  quiz  : '📝 測驗管理',
  links : '🔗 統計連結管理',
};

function showPanel(name, btn) {
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.admin-nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('admin-topbar-title').textContent = panelTitles[name];
  btn.classList.add('active');
  if (window.innerWidth <= 900) toggleAdminSidebar();
}

// ── 統計連結管理 ──────────────────────────────
const LINKS_SHEET = '各項統計分析';
const SHEET_ID = '1b4xq2XxSCbuIF6SZU-x0Jz4Du_n-YRAJCSQrkm2ze3U';
let linksData = []; // { row, name, desc, url, status }
let editingRow = null; // null=新增, number=編輯列號(1-based, 資料從第3列起)

// 切換到統計連結面板時自動載入
const _origShowPanel = showPanel;
function showPanel(name, btn) {
  _origShowPanel(name, btn);
  if (name === 'links') loadLinksAdmin();
}

async function loadLinksAdmin() {
  document.getElementById('links-loading-admin').style.display = 'block';
  document.getElementById('links-table-wrap').style.display = 'none';
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(LINKS_SHEET)}&headers=0`;
    const res = await fetch(url);
    const text = await res.text();
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!match) throw new Error('無法讀取');
    const json = JSON.parse(match[1]);

    linksData = json.table.rows.slice(2)
      .map((r, i) => ({
        row   : i + 3, // 試算表實際列號（第3列起）
        name  : r.c?.[0]?.v || '',
        desc  : r.c?.[1]?.v || '',
        url   : r.c?.[2]?.v || '',
        status: r.c?.[3]?.v || '開放中',
      }))
      .filter(r => r.name);

    renderLinksTable();
  } catch(e) {
    alert('載入連結資料失敗，請稍後再試');
  }
  document.getElementById('links-loading-admin').style.display = 'none';
  document.getElementById('links-table-wrap').style.display = 'block';
}

function renderLinksTable() {
  const tbody = document.getElementById('links-tbody');
  const empty = document.getElementById('links-empty-admin');
  tbody.innerHTML = '';

  if (linksData.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  linksData.forEach(l => {
    const isOpen = l.status === '開放中';
    const tr = document.createElement('tr');
    tr.style.borderBottom = '1px solid var(--border)';
    tr.innerHTML = `
      <td style="padding:12px 16px;font-size:14px;font-weight:700;color:var(--text-dark);">${l.name}</td>
      <td style="padding:12px 16px;font-size:13px;color:var(--text-mid);">${l.desc || '—'}</td>
      <td style="padding:12px 16px;font-size:12px;color:#2980b9;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
        <a href="${l.url}" target="_blank" style="color:#2980b9;">${l.url || '—'}</a>
      </td>
      <td style="padding:12px 16px;text-align:center;">
        <span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
          background:${isOpen ? '#dcfce7' : '#f1f5f9'};
          color:${isOpen ? '#16a34a' : '#94a3b8'};
          border:1px solid ${isOpen ? '#bbf7d0' : '#e2e8f0'};">
          ${l.status}
        </span>
      </td>
      <td style="padding:12px 16px;text-align:center;">
        <div style="display:flex;gap:6px;justify-content:center;">
          <button onclick="openLinkForm(${l.row})"
            style="padding:5px 12px;border:1.5px solid #2980b9;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:#2980b9;font-family:inherit;">
            編輯
          </button>
          <button onclick="deleteLink(${l.row},'${l.name.replace(/'/g, "\\'")}')"
            style="padding:5px 12px;border:1.5px solid var(--accent);border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:var(--accent);font-family:inherit;">
            刪除
          </button>
        </div>
      </td>`;
    tbody.appendChild(tr);
  });
}

// 開啟表單（新增 or 編輯）
function openLinkForm(row) {
  editingRow = row || null;
  const overlay = document.getElementById('link-form-overlay');
  document.getElementById('lf-error').style.display = 'none';

  if (editingRow) {
    const l = linksData.find(x => x.row === row);
    document.getElementById('link-form-title').textContent = '✏️ 編輯連結';
    document.getElementById('lf-name').value = l.name;
    document.getElementById('lf-desc').value = l.desc;
    document.getElementById('lf-url').value = l.url;
    document.getElementById('lf-status').value = l.status;
  } else {
    document.getElementById('link-form-title').textContent = '＋ 新增連結';
    document.getElementById('lf-name').value = '';
    document.getElementById('lf-desc').value = '';
    document.getElementById('lf-url').value = '';
    document.getElementById('lf-status').value = '開放中';
  }

  overlay.style.display = 'flex';
  setTimeout(() => document.getElementById('lf-name').focus(), 100);
}

function closeLinkForm() {
  document.getElementById('link-form-overlay').style.display = 'none';
}

// 點遮罩關閉
document.getElementById('link-form-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeLinkForm();
});

async function submitLinkForm() {
  const name   = document.getElementById('lf-name').value.trim();
  const desc   = document.getElementById('lf-desc').value.trim();
  const url    = document.getElementById('lf-url').value.trim();
  const status = document.getElementById('lf-status').value;
  const err    = document.getElementById('lf-error');
  const btn    = document.getElementById('lf-submit');

  if (!name) { err.textContent = '請填寫連結名稱'; err.style.display = 'block'; return; }
  if (!url)  { err.textContent = '請填寫連結網址'; err.style.display = 'block'; return; }
  err.style.display = 'none';

  btn.disabled = true;
  btn.textContent = '儲存中…';

  try {
    const payload = {
      action: 'manageLinks',
      type  : editingRow ? 'edit' : 'add',
      row   : editingRow,
      name, desc, url, status,
    };
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body  : JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.success) {
      closeLinkForm();
      await loadLinksAdmin();
    } else {
      throw new Error(data.error || '儲存失敗');
    }
  } catch(e) {
    err.textContent = '儲存失敗：' + e.message;
    err.style.display = 'block';
  }

  btn.disabled = false;
  btn.textContent = '儲存';
}

async function deleteLink(row, name) {
  if (!confirm(`確定要刪除「${name}」嗎？`)) return;
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body  : JSON.stringify({ action: 'manageLinks', type: 'delete', row }),
    });
    const data = await res.json();
    if (data.success) {
      await loadLinksAdmin();
    } else {
      throw new Error(data.error || '刪除失敗');
    }
  } catch(e) {
    alert('刪除失敗：' + e.message);
  }
}

// 手機版側欄開關
function toggleAdminSidebar() {
  const s = document.getElementById('admin-sidebar');
  const o = document.getElementById('admin-sidebar-overlay');
  const open = s.classList.toggle('open');
  o.style.display = open ? 'block' : 'none';
}

// spin 動畫
const adminStyle = document.createElement('style');
adminStyle.textContent = '@keyframes admin-spin { to { transform: rotate(360deg); } }';
document.head.appendChild(adminStyle);
</script>
</body>
