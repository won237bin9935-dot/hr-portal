<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>文件簽名 — 華美光學</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #f56a6a;
      --green: #27ae60;
      --border: #e8e8e8;
      --bg: #f8f9fa;
      --text: #3d4449;
      --text-mid: #666;
      --text-light: #999;
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .header-title { font-size: 14px; font-weight: 700; }
    .header-sub { font-size: 11px; color: var(--text-light); }

    .container { max-width: 560px; margin: 0 auto; padding: 24px 16px 40px; }

    .doc-banner { background: linear-gradient(135deg, #2e3141, #3d4466); border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; color: #fff; }
    .doc-banner .label { font-size: 11px; opacity: .6; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .08em; }
    .doc-banner .name { font-size: 18px; font-weight: 800; }

    .form-card { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
    .form-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-mid); display: block; margin-bottom: 6px; }
    .field input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; color: var(--text); outline: none; font-family: inherit; }
    .field input:focus { border-color: var(--accent); }

    .sig-card { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
    .sig-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .sig-hint { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }

    .canvas-wrap { position: relative; border: 2px dashed var(--border); border-radius: 10px; background: #fafafa; overflow: hidden; }
    #sig-canvas { display: block; width: 100%; height: 200px; cursor: crosshair; touch-action: none; }
    .canvas-placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--text-light); font-size: 13px; pointer-events: none; }

    .sig-actions { margin-top: 10px; display: flex; justify-content: flex-end; }
    .btn-clear { background: none; border: 1.5px solid var(--border); color: var(--text-mid); font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 20px; cursor: pointer; font-family: inherit; }
    .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

    .btn-submit { width: 100%; background: var(--green); color: #fff; font-size: 16px; font-weight: 800; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; transition: background .2s; }
    .btn-submit:hover { background: #219a52; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .success-box { display: none; text-align: center; padding: 48px 20px; background: #fff; border-radius: 14px; border: 1px solid var(--border); }
    .success-box .icon { font-size: 56px; display: block; margin-bottom: 16px; }
    .success-box h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .success-box p { font-size: 14px; color: var(--text-mid); line-height: 1.7; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    .overlay.show { display: flex; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏢</div>
  <div>
    <div class="header-title">華美光學人資系統</div>
    <div class="header-sub">文件簽名確認</div>
  </div>
</div>

<div class="container">

  <div id="form-area">
    <div class="doc-banner">
      <div class="label">文件名稱</div>
      <div class="name" id="doc-name">載入中…</div>
    </div>

    <div class="form-card">
      <h3>📋 基本資料</h3>
      <div class="field">
        <label>工號 *</label>
        <input type="text" id="f-id" placeholder="請輸入工號" inputmode="numeric"/>
      </div>
      <div class="field">
        <label>姓名 *</label>
        <input type="text" id="f-name" placeholder="請輸入姓名"/>
      </div>
    </div>

    <div class="sig-card">
      <h3>✍️ 手寫簽名</h3>
      <p class="sig-hint">請在下方用手指或滑鼠簽名</p>
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="sig-canvas"></canvas>
        <div class="canvas-placeholder" id="placeholder">請在此處簽名</div>
      </div>
      <div class="sig-actions">
        <button class="btn-clear" id="btn-clear">清除簽名</button>
      </div>
    </div>

    <button class="btn-submit" id="btn-submit">完成並送出</button>
  </div>

  <div class="success-box" id="success-box">
    <span class="icon">✅</span>
    <h2>簽名完成！</h2>
    <p>感謝您完成簽名確認。<br>您的簽名已成功送出。</p>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div style="font-size:14px;color:#666;font-weight:600">正在送出，請稍候…</div>
</div>

<script>
// ★ 貼上你的 Apps Script 網址 ★
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxfo--2xa9vk6tlIzCjNyu3Y76AQIzYj-tM3XcvFQO72QwkWEqYIW_jSl2JRtE2tgql/exec';

// 讀取網址參數
const docName = new URLSearchParams(window.location.search).get('doc') || '未指定文件';
document.getElementById('doc-name').textContent = docName;

// Canvas 初始化
const canvas = document.getElementById('sig-canvas');
const ctx = canvas.getContext('2d');
let drawing = false;
let signed = false;

function initCanvas() {
  const w = canvas.parentElement.offsetWidth;
  const h = 200;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}
initCanvas();

function getXY(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches && e.touches.length) {
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener('mousedown', function(e) {
  drawing = true;
  const p = getXY(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  if (!signed) {
    signed = true;
    document.getElementById('placeholder').style.display = 'none';
  }
});
canvas.addEventListener('mousemove', function(e) {
  if (!drawing) return;
  const p = getXY(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
});
canvas.addEventListener('mouseup', function() { drawing = false; });
canvas.addEventListener('mouseleave', function() { drawing = false; });

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  drawing = true;
  const p = getXY(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  if (!signed) {
    signed = true;
    document.getElementById('placeholder').style.display = 'none';
  }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!drawing) return;
  const p = getXY(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  drawing = false;
}, { passive: false });

document.getElementById('btn-clear').addEventListener('click', function() {
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  signed = false;
  document.getElementById('placeholder').style.display = 'block';
});

document.getElementById('btn-submit').addEventListener('click', async function() {
  const empId = document.getElementById('f-id').value.trim();
  const name = document.getElementById('f-name').value.trim();

  if (!empId || !name) { alert('請填寫工號及姓名'); return; }
  if (!signed) { alert('請完成手寫簽名'); return; }

  // 合成圖片 B5 尺寸（1240 × 1754px）
  const B5W = 1240;
  const B5H = 1754;
  const out = document.createElement('canvas');
  out.width = B5W;
  out.height = B5H;
  const octx = out.getContext('2d');

  // 白色背景
  octx.fillStyle = '#ffffff';
  octx.fillRect(0, 0, B5W, B5H);

  // 邊框
  octx.strokeStyle = '#cccccc';
  octx.lineWidth = 2;
  octx.strokeRect(20, 20, B5W - 40, B5H - 40);

  // 標題區背景
  octx.fillStyle = '#f8f9fa';
  octx.fillRect(20, 20, B5W - 40, 160);

  // 標題區底線
  octx.strokeStyle = '#e8e8e8';
  octx.lineWidth = 1.5;
  octx.beginPath();
  octx.moveTo(20, 180);
  octx.lineTo(B5W - 20, 180);
  octx.stroke();

  // 文件名稱
  octx.fillStyle = '#3d4449';
  octx.font = 'bold 36px Microsoft JhengHei, sans-serif';
  octx.fillText('文件名稱：' + docName, 48, 80);

  // 工號、姓名、回簽日期（同一行）
  const today = new Date();
  const dateStr = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' +
    String(today.getDate()).padStart(2,'0');
  octx.font = '28px Microsoft JhengHei, sans-serif';
  octx.fillText(`工號：${empId}　　姓名：${name}　　回簽日期：${dateStr}`, 48, 148);

  // 簽名區標籤
  octx.fillStyle = '#999999';
  octx.font = '24px Microsoft JhengHei, sans-serif';
  octx.fillText('簽名：', 48, 240);

  // 把原始簽名畫到 B5 畫布上，置中並放大
  const sigW = B5W - 100;
  const sigH = B5H - 320;
  const srcW = canvas.width;
  const srcH = canvas.height;

  // 等比例縮放
  const scale = Math.min(sigW / srcW, sigH / srcH);
  const drawW = srcW * scale;
  const drawH = srcH * scale;
  const drawX = (B5W - drawW) / 2;
  const drawY = 260;

  // 簽名區邊框
  octx.strokeStyle = '#dddddd';
  octx.lineWidth = 1;
  octx.strokeRect(40, 255, B5W - 80, drawH + 20);

  octx.drawImage(canvas, drawX, drawY, drawW, drawH);

  // 底部版權
  octx.fillStyle = '#cccccc';
  octx.font = '20px Microsoft JhengHei, sans-serif';
  octx.textAlign = 'center';
  octx.fillText('華美光學股份有限公司 人資部', B5W / 2, B5H - 40);

  const imgData = out.toDataURL('image/png');

  document.getElementById('overlay').classList.add('show');
  document.getElementById('btn-submit').disabled = true;

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        docName: docName,
        employeeId: empId,
        name: name,
        department: '',
        signature: imgData
      })
    });
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success-box').style.display = 'block';
  } catch(err) {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('btn-submit').disabled = false;
    alert('送出失敗，請檢查網路後再試。\n' + err.message);
  }
});
</script>
</body>
</html>
