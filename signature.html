<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>文件簽名 — 華美光學</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #f56a6a;
      --green: #27ae60;
      --border: #e8e8e8;
      --bg: #f8f9fa;
      --text: #3d4449;
      --text-mid: #666;
      --text-light: #999;
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 20px; display: flex; align-items: center; gap: 12px; }
    .header-logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    .header-title { font-size: 14px; font-weight: 700; }
    .header-sub { font-size: 11px; color: var(--text-light); }

    .container { max-width: 560px; margin: 0 auto; padding: 24px 16px 40px; }

    .doc-banner { background: linear-gradient(135deg, #2e3141, #3d4466); border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; color: #fff; }
    .doc-banner .label { font-size: 11px; opacity: .6; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .08em; }
    .doc-banner .name { font-size: 18px; font-weight: 800; }

    .form-card { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
    .form-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text-mid); display: block; margin-bottom: 6px; }
    .field input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; color: var(--text); outline: none; font-family: inherit; }
    .field input:focus { border-color: var(--accent); }

    .sig-card { background: #fff; border-radius: 14px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
    .sig-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
    .sig-hint { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }

    .canvas-wrap { position: relative; border: 2px dashed var(--border); border-radius: 10px; background: #fafafa; overflow: hidden; }
    #sig-canvas { display: block; width: 100%; height: 200px; cursor: crosshair; touch-action: none; }
    .canvas-placeholder { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: var(--text-light); font-size: 13px; pointer-events: none; }

    .sig-actions { margin-top: 10px; display: flex; justify-content: flex-end; }
    .btn-clear { background: none; border: 1.5px solid var(--border); color: var(--text-mid); font-size: 13px; font-weight: 600; padding: 7px 16px; border-radius: 20px; cursor: pointer; font-family: inherit; }
    .btn-clear:hover { border-color: var(--accent); color: var(--accent); }

    .btn-submit { width: 100%; background: var(--green); color: #fff; font-size: 16px; font-weight: 800; padding: 15px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; transition: background .2s; }
    .btn-submit:hover { background: #219a52; }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }

    .success-box { display: none; text-align: center; padding: 48px 20px; background: #fff; border-radius: 14px; border: 1px solid var(--border); }
    .success-box .icon { font-size: 56px; display: block; margin-bottom: 16px; }
    .success-box h2 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .success-box p { font-size: 14px; color: var(--text-mid); line-height: 1.7; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,.85); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 14px; }
    .overlay.show { display: flex; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">🏢</div>
  <div>
    <div class="header-title">華美光學人資系統</div>
    <div class="header-sub">文件簽名確認</div>
  </div>
</div>

<div class="container">

  <div id="form-area">
    <div class="doc-banner">
      <div class="label">文件名稱</div>
      <div class="name" id="doc-name">載入中…</div>
    </div>

    <div class="form-card">
      <h3>📋 基本資料</h3>
      <div class="field">
        <label>工號 *</label>
        <input type="text" id="f-id" placeholder="請輸入工號" inputmode="numeric"/>
      </div>
      <div class="field">
        <label>姓名 *</label>
        <input type="text" id="f-name" placeholder="請輸入姓名"/>
      </div>
    </div>

    <div class="sig-card">
      <h3>✍️ 手寫簽名</h3>
      <p class="sig-hint">請在下方用手指或滑鼠簽名</p>
      <div class="canvas-wrap" id="canvas-wrap">
        <canvas id="sig-canvas"></canvas>
        <div class="canvas-placeholder" id="placeholder">請在此處簽名</div>
      </div>
      <div class="sig-actions">
        <button class="btn-clear" id="btn-clear">清除簽名</button>
      </div>
    </div>

    <button class="btn-submit" id="btn-submit">完成並送出</button>
  </div>

  <div class="success-box" id="success-box">
    <span class="icon">✅</span>
    <h2>簽名完成！</h2>
    <p>感謝您完成簽名確認。<br>您的簽名已成功送出。</p>
  </div>

</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div style="font-size:14px;color:#666;font-weight:600">正在送出，請稍候…</div>
</div>

<script>
// ★ 貼上你的 Apps Script 網址 ★
const SCRIPT_URL = '【貼上Apps Script網址】';

// 讀取網址參數
const docName = new URLSearchParams(window.location.search).get('doc') || '未指定文件';
document.getElementById('doc-name').textContent = docName;

// Canvas 初始化
const canvas = document.getElementById('sig-canvas');
const ctx = canvas.getContext('2d');
let drawing = false;
let signed = false;

function initCanvas() {
  const w = canvas.parentElement.offsetWidth;
  const h = 200;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.scale(dpr, dpr);
  ctx.strokeStyle = '#1a1a2e';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
}
initCanvas();

function getXY(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches && e.touches.length) {
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener('mousedown', function(e) {
  drawing = true;
  const p = getXY(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  if (!signed) {
    signed = true;
    document.getElementById('placeholder').style.display = 'none';
  }
});
canvas.addEventListener('mousemove', function(e) {
  if (!drawing) return;
  const p = getXY(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
});
canvas.addEventListener('mouseup', function() { drawing = false; });
canvas.addEventListener('mouseleave', function() { drawing = false; });

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  drawing = true;
  const p = getXY(e);
  ctx.beginPath();
  ctx.moveTo(p.x, p.y);
  if (!signed) {
    signed = true;
    document.getElementById('placeholder').style.display = 'none';
  }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (!drawing) return;
  const p = getXY(e);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
}, { passive: false });
canvas.addEventListener('touchend', function(e) {
  e.preventDefault();
  drawing = false;
}, { passive: false });

document.getElementById('btn-clear').addEventListener('click', function() {
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
  signed = false;
  document.getElementById('placeholder').style.display = 'block';
});

document.getElementById('btn-submit').addEventListener('click', async function() {
  const empId = document.getElementById('f-id').value.trim();
  const name = document.getElementById('f-name').value.trim();

  if (!empId || !name) { alert('請填寫工號及姓名'); return; }
  if (!signed) { alert('請完成手寫簽名'); return; }

  // 合成圖片（動態高度，緊湊版面）
  const OW = 1240; // 固定寬度
  const PADDING = 48;
  const dpr = window.devicePixelRatio || 1;

  // 計算日期
  const today = new Date();
  const dateStr = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' +
    String(today.getDate()).padStart(2,'0');

  // 縮放簽名至固定寬度
  const sigSrcW = canvas.width;
  const sigSrcH = canvas.height;
  const sigScale = (OW - PADDING * 2) / sigSrcW;
  const sigDrawW = sigSrcW * sigScale;
  const sigDrawH = sigSrcH * sigScale;

  // 裁切簽名的實際有效區域（去除空白）
  const tempCtx = canvas.getContext('2d');
  const imgPixels = tempCtx.getImageData(0, 0, canvas.width, canvas.height);
  let minY = canvas.height, maxY = 0;
  for (let y = 0; y < canvas.height; y++) {
    for (let x = 0; x < canvas.width; x++) {
      const alpha = imgPixels.data[(y * canvas.width + x) * 4 + 3];
      if (alpha > 10) { if (y < minY) minY = y; if (y > maxY) maxY = y; }
    }
  }
  if (minY > maxY) { minY = 0; maxY = canvas.height; }
  const margin = 20;
  minY = Math.max(0, minY - margin);
  maxY = Math.min(canvas.height, maxY + margin);
  const cropH = maxY - minY;
  const cropScale = (OW - PADDING * 2) / canvas.width;
  const cropDrawH = cropH * cropScale;

  // 計算總高度
  const headerH = 200;  // 標題區（含已閱讀完畢）
  const sigLabelH = 50; // 簽名標籤
  const sigAreaH = Math.max(cropDrawH, 150); // 簽名實際高度
  const footerH = 60;   // 底部
  const totalH = headerH + 40 + sigLabelH + sigAreaH + footerH + 40;

  const out = document.createElement('canvas');
  out.width = OW;
  out.height = totalH;
  const octx = out.getContext('2d');

  // 白色背景
  octx.fillStyle = '#ffffff';
  octx.fillRect(0, 0, OW, totalH);

  // 外框
  octx.strokeStyle = '#cccccc';
  octx.lineWidth = 2;
  octx.strokeRect(1, 1, OW - 2, totalH - 2);

  // 標題區背景
  octx.fillStyle = '#f8f9fa';
  octx.fillRect(0, 0, OW, headerH);

  // 標題區底線
  octx.strokeStyle = '#dddddd';
  octx.lineWidth = 1.5;
  octx.beginPath();
  octx.moveTo(0, headerH);
  octx.lineTo(OW, headerH);
  octx.stroke();

  // 文件名稱
  octx.fillStyle = '#3d4449';
  octx.font = 'bold 38px Microsoft JhengHei, sans-serif';
  octx.textAlign = 'left';
  octx.fillText('文件名稱：' + docName, PADDING, 70);

  // 工號、姓名、回簽日期
  octx.font = '30px Microsoft JhengHei, sans-serif';
  octx.fillStyle = '#555';
  octx.fillText(`工號：${empId}　　姓名：${name}　　回簽日期：${dateStr}`, PADDING, 140);

  // 已閱讀完畢聲明
  octx.fillStyle = '#3d4449';
  octx.font = `bold ${26 * 1}px Microsoft JhengHei, sans-serif`;
  octx.fillText('本人已閱讀完畢上述文件內容', PADDING, 178);

  // 簽名標籤
  let curY = headerH + 40;
  octx.fillStyle = '#888';
  octx.font = '26px Microsoft JhengHei, sans-serif';
  octx.fillText('簽名：', PADDING, curY);
  curY += 20;

  // 簽名區邊框
  octx.strokeStyle = '#e0e0e0';
  octx.lineWidth = 1;
  octx.strokeRect(PADDING - 8, curY, OW - PADDING * 2 + 16, sigAreaH + 16);

  // 畫簽名（裁切空白後）
  const offscreen = document.createElement('canvas');
  offscreen.width = canvas.width;
  offscreen.height = cropH;
  const offCtx = offscreen.getContext('2d');
  offCtx.drawImage(canvas, 0, -minY);
  octx.drawImage(offscreen, PADDING, curY + 8, OW - PADDING * 2, sigAreaH);

  curY += sigAreaH + 24;

  // 分隔線
  octx.strokeStyle = '#dddddd';
  octx.lineWidth = 1;
  octx.beginPath();
  octx.moveTo(PADDING, curY);
  octx.lineTo(OW - PADDING, curY);
  octx.stroke();
  curY += 30;

  // 公司名稱
  octx.fillStyle = '#aaa';
  octx.font = '24px Microsoft JhengHei, sans-serif';
  octx.textAlign = 'center';
  octx.fillText('華美光學科技股份有限公司 人力營運處', OW / 2, curY + 10);

  const imgData = out.toDataURL('image/png');

  document.getElementById('overlay').classList.add('show');
  document.getElementById('btn-submit').disabled = true;

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        docName: docName,
        employeeId: empId,
        name: name,
        department: '',
        signature: imgData
      })
    });
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('form-area').style.display = 'none';
    document.getElementById('success-box').style.display = 'block';
  } catch(err) {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('btn-submit').disabled = false;
    alert('送出失敗，請檢查網路後再試。\n' + err.message);
  }
});
</script>
</body>
</html>
