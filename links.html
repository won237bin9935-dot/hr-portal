<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>相關系統連結 — 華美光學人資系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #f56a6a;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text-dark: #3d4449;
      --text-mid: #666;
      --text-light: #999;
      --border: #e8e8e8;
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text-dark); display: flex; min-height: 100vh; }

    .content { padding:32px; flex:1; }

    /* Links grid */
    .links-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    .link-card {
      background: #ffffff;
      border-radius: 14px;
      border: 1px solid var(--lc-border, #ddd6fe);
      border-left: 4px solid var(--lc-primary, #7c3aed);
      padding: 22px;
      width: 85%;
      transition: all .2s;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      cursor: pointer;
    }
    .link-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--lc-primary, #7c3aed);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .25s;
    }
    .link-card:hover { box-shadow:0 6px 20px rgba(0,0,0,.12); transform:translateY(-2px); }
    .link-card:hover::before { transform:scaleX(1); }
    .link-card.disabled { opacity:.5; pointer-events:none; cursor:default; }
    .link-card-top { display:flex; align-items:flex-start; justify-content:space-between; }
    .link-card-icon { width:46px; height:46px; background:var(--lc-light, #f3eeff); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .link-card-status { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; background:#dcfce7; color:#16a34a; border:1px solid #bbf7d0; }
    .link-card h3 { font-size:17px; font-weight:800; margin-bottom:4px; line-height:1.3; color:var(--text-dark); }
    .link-card p { font-size:12px; color:var(--text-light); }
    @media (max-width:1100px) { .links-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:900px) {
      #sidebar{transform:translateX(-100%)}
      #sidebar.open{transform:translateX(0)}
      #sidebar-close{display:block!important}
      #main{margin-left:0}
      .menu-toggle{display:block}
      .links-grid{grid-template-columns:1fr}
      .link-card{width:100%;}
    }
    @media (max-width:560px) { .content{padding:20px 16px} .hero-icon{display:none} .links-hero{padding:24px} }

    /* Page hero */
    .page-hero {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      height: 120px;
      width: 100%;
    }
    .page-hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      width: 100%;
      height: 100%;
    }
    .page-hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
    }
    .page-hero-content {
      position: relative;
      z-index: 2;
      padding: 0 40px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .page-hero-title {
      font-size: 22px;
      font-weight: 900;
      color: #3d4449;
      margin-bottom: 4px;
      text-shadow: 0 1px 3px rgba(255,255,255,.6);
    }
    .page-hero-desc {
      font-size: 13px;
      color: #3d4449;
      font-weight: 500;
    }

    /* Layout fix */
    body { display:flex; min-height:100vh; }
    #main { margin-left:var(--sidebar-width,260px); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    @media (max-width:900px) { #main { margin-left:0; } }

    /* Password Modal */
    #pwd-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #pwd-modal-overlay.active {
      display: flex;
    }
    #pwd-modal {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
      position: relative;
    }
    #pwd-modal .modal-close {
      position: absolute;
      top: 14px; right: 18px;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-light);
      line-height: 1;
      border: none;
      background: none;
      padding: 0;
    }
    #pwd-modal .modal-close:hover { color: var(--text-dark); }
    #pwd-modal .modal-icon { font-size: 44px; margin-bottom: 14px; }
    #pwd-modal h2 { font-size: 17px; font-weight: 800; margin-bottom: 6px; color: var(--text-dark); }
    #pwd-modal .modal-name { font-size: 13px; color: var(--text-mid); margin-bottom: 20px; }
    #pwd-modal input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 10px;
      outline: none;
      font-family: inherit;
      transition: border-color .2s;
    }
    #pwd-modal input[type="password"]:focus { border-color: #f56a6a; }
    #pwd-error-msg { color: #f56a6a; font-size: 13px; margin-bottom: 10px; display: none; }
    #pwd-modal button.confirm-btn {
      width: 100%;
      background: #f56a6a;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background .2s;
    }
    #pwd-modal button.confirm-btn:hover { background: #e05555; }
    #pwd-modal button.confirm-btn:disabled { background: #f5a0a0; cursor: default; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar"></aside>

<div id="main">
  <header class="topbar"></header>

  <main class="content">
    <div class="page-hero">
      <div class="page-hero-bg" style="background-image:url('https://lh3.googleusercontent.com/d/11mMlTi73o8ImtFI8u7EP9Smbyj8To2eP')"></div>
      <div class="page-hero-overlay"></div>
      <div class="page-hero-content">
        <div class="page-hero-title">📊 各項統計分析</div>
        <div class="page-hero-desc">點擊卡片後輸入密碼即可開啟使用。</div>
      </div>
    </div>

    <!-- 卡片區 -->
    <div id="links-loading" style="text-align:center;padding:60px;color:var(--text-light);">
      <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:#f56a6a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;"></div>
      <p>載入連結中…</p>
    </div>
    <div class="links-grid" id="links-grid"></div>
    <div id="links-empty" style="display:none;text-align:center;padding:60px;color:var(--text-light);">
      <div style="font-size:48px;margin-bottom:12px;">🔗</div>
      <p>目前沒有連結</p>
    </div>
  </main>
</div>

<!-- 密碼 Modal -->
<div id="pwd-modal-overlay">
  <div id="pwd-modal">
    <button class="modal-close" onclick="closeModal()" title="關閉">✕</button>
    <div class="modal-icon">🔐</div>
    <h2>請輸入密碼</h2>
    <div class="modal-name" id="modal-link-name"></div>
    <input type="password" id="pwd-input" placeholder="請輸入密碼"
      onkeydown="if(event.key==='Enter')confirmPwd()" />
    <p id="pwd-error-msg">密碼錯誤，請重試</p>
    <button class="confirm-btn" id="confirm-btn" onclick="confirmPwd()">確認</button>
  </div>
</div>

<script src="sheets-config.js"></script>
<script src="sidebar.js"></script>
<script src="topbar.js"></script>
<script>
const SHEET_ID = (typeof HRCONFIG !== 'undefined' && HRCONFIG.SHEETS_ID)
  ? HRCONFIG.SHEETS_ID
  : '1b4xq2XxSCbuIF6SZU-x0Jz4Du_n-YRAJCSQrkm2ze3U';
const SHEET_TAB = '各項統計分析';

const LINK_COLORS = [
  { primary: '#2980b9', light: '#e8f3fb', border: '#bee3f8' },
  { primary: '#26c067', light: '#e8faf0', border: '#b2f0d0' },
  { primary: '#ff7512', light: '#fff0e0', border: '#ffd5a0' },
  { primary: '#9b59b6', light: '#f5eeff', border: '#ddb8f5' },
  { primary: '#f56a6a', light: '#fff0f0', border: '#ffc0c0' },
  { primary: '#16acd0', light: '#e0f7fc', border: '#a0e4f5' },
  { primary: '#f0a500', light: '#fff7e0', border: '#ffd980' },
  { primary: '#e74c3c', light: '#fdecea', border: '#f5b8b8' },
  { primary: '#1a3a6e', light: '#e8eef8', border: '#b0c4e8' },
  { primary: '#11734b', light: '#e0f5ec', border: '#90dab8' },
  { primary: '#8e44ad', light: '#f3e8fb', border: '#d0a0f0' },
  { primary: '#7f8c1d', light: '#f4f6e0', border: '#d0d888' },
];

let pendingUrl = '';

// ── 頁面載入：只抓卡片資料（不含密碼驗證）
window.addEventListener('DOMContentLoaded', loadLinksData);

async function fetchSheetJson() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}&headers=0`;
  const res = await fetch(url);
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!match) throw new Error('無法讀取');
  return JSON.parse(match[1]);
}

async function loadLinksData() {
  try {
    const json = await fetchSheetJson();
    renderCards(json);
  } catch(e) {
    document.getElementById('links-loading').style.display = 'none';
    document.getElementById('links-empty').style.display = 'block';
  }
}

function renderCards(json) {
  const rows = json.table.rows.slice(2)
    .filter(r => r.c && r.c[0]?.v)
    .map(r => ({
      name  : r.c[0]?.v || '',
      desc  : r.c[1]?.v || '',
      url   : r.c[2]?.v || '',
      status: r.c[3]?.v || '',
    }));

  document.getElementById('links-loading').style.display = 'none';

  if (rows.length === 0) {
    document.getElementById('links-empty').style.display = 'block';
    return;
  }

  const grid = document.getElementById('links-grid');
  grid.innerHTML = '';

  rows.forEach((l, i) => {
    const color = LINK_COLORS[i % LINK_COLORS.length];
    const isOpen = l.status !== '已停用';
    const card = document.createElement('div');
    card.className = 'link-card' + (isOpen ? '' : ' disabled');
    card.style.setProperty('--lc-primary', color.primary);
    card.style.setProperty('--lc-light',   color.light);
    card.style.setProperty('--lc-border',  color.border);
    card.innerHTML = `
      <div class="link-card-top">
        <div class="link-card-icon">📊</div>
        <span class="link-card-status">${isOpen ? '開放中' : '已停用'}</span>
      </div>
      <h3>${l.name}</h3>
      ${l.desc ? `<p>${l.desc}</p>` : ''}`;

    if (isOpen && l.url) {
      card.addEventListener('click', () => openModal(l.name, l.url));
    }
    grid.appendChild(card);
  });
}

// ── Modal 開關
function openModal(name, url) {
  pendingUrl = url;
  document.getElementById('modal-link-name').textContent = name;
  document.getElementById('pwd-input').value = '';
  document.getElementById('pwd-error-msg').style.display = 'none';
  document.getElementById('confirm-btn').disabled = false;
  document.getElementById('confirm-btn').textContent = '確認';
  document.getElementById('pwd-modal-overlay').classList.add('active');
  setTimeout(() => document.getElementById('pwd-input').focus(), 100);
}

function closeModal() {
  document.getElementById('pwd-modal-overlay').classList.remove('active');
  pendingUrl = '';
}

// 點遮罩關閉
document.getElementById('pwd-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── 密碼確認：點擊時才去 fetch 驗證（與原版邏輯相同）
async function confirmPwd() {
  const input = document.getElementById('pwd-input').value.trim();
  document.getElementById('pwd-error-msg').style.display = 'none';

  const btn = document.getElementById('confirm-btn');
  btn.disabled = true;
  btn.textContent = '驗證中…';

  try {
    const json = await fetchSheetJson();
    const pwd = json.table.rows[0]?.c[1]?.v?.toString().trim();

    if (input === pwd) {
      const urlToOpen = pendingUrl;
      closeModal();
      window.open(urlToOpen, '_blank');
    } else {
      document.getElementById('pwd-error-msg').style.display = 'block';
      document.getElementById('pwd-input').value = '';
      document.getElementById('pwd-input').focus();
      btn.disabled = false;
      btn.textContent = '確認';
    }
  } catch(e) {
    alert('驗證失敗，請稍後再試');
    btn.disabled = false;
    btn.textContent = '確認';
  }
}
</script>
</body>
</html>
