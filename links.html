<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>相關系統連結 — 華美光學人資系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      
      --accent: #f56a6a;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text-dark: #3d4449;
      --text-mid: #666;
      --text-light: #999;
      --border: #e8e8e8;
      
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text-dark); display: flex; min-height: 100vh; }

    
    
    
    
    
    
    
    
    
    
    
    
    

    
    
    
    
    
    
    
    
    .content { padding:32px; flex:1; }

    /* Hero */
    
    .links-hero::before { content:''; position:absolute; right:-60px; top:-60px; width:240px; height:240px; border-radius:50%; background:rgba(255,255,255,.06); }
    
    
    

    /* Coming soon */
    .coming-soon {
      background: var(--card-bg);
      border-radius: 16px;
      border: 2px dashed var(--border);
      padding: 60px;
      text-align: center;
      color: var(--text-light);
    }
    .coming-soon .cs-icon { font-size:56px; display:block; margin-bottom:16px; }
    .coming-soon h2 { font-size:18px; font-weight:700; color:var(--text-mid); margin-bottom:8px; }
    .coming-soon p { font-size:14px; line-height:1.7; }

    /* Links grid (for future use) */
    .links-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
    .link-card {
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .link-card:hover { box-shadow:0 6px 20px rgba(0,0,0,.09); transform:translateY(-2px); }
    .link-icon { width:48px; height:48px; border-radius:12px; background:#f0f1f5; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .link-info h3 { font-size:15px; font-weight:700; margin-bottom:4px; }
    .link-info p { font-size:12px; color:var(--text-light); }
    .link-arrow { margin-left:auto; color:var(--text-light); font-size:18px; }

    

    @media (max-width:900px) { #sidebar{transform:translateX(-100%)} #sidebar.open{transform:translateX(0)} #sidebar-close{display:block!important} #main{margin-left:0} .menu-toggle{display:block} .links-grid{grid-template-columns:1fr} }
    @media (max-width:560px) { .content{padding:20px 16px} .hero-icon{display:none} .links-hero{padding:24px} .coming-soon{padding:40px 20px} }
  
    .page-hero {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      height: 120px;
      width: 100%;
    }
    .page-hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      width: 100%;
      height: 100%;
    }
    .page-hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
    }
    .page-hero-content {
      position: relative;
      z-index: 2;
      padding: 0 40px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .page-hero-title {
      font-size: 22px;
      font-weight: 900;
      color: #3d4449;
      margin-bottom: 4px;
      text-shadow: 0 1px 3px rgba(255,255,255,.6);
    }
    .page-hero-desc {
      font-size: 13px;
      color: #3d4449;
      font-weight: 500;
    }
  
    /* Layout fix */
    body { display:flex; min-height:100vh; }
    #main { margin-left:var(--sidebar-width,260px); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    @media (max-width:900px) { #main { margin-left:0; } }

  </style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
  <div class="sidebar-header">
    <img src="https://lh3.googleusercontent.com/d/1VFVjgXLuw7v6yEPLi_BnF2zRXEhah8UQ" alt="華美光學" style="height:44px;object-fit:contain;flex-shrink:0;">
    <button onclick="toggleSidebar()" id="sidebar-close">✕</button>
  </div>
  <nav>
    <div class="nav-section-label">主選單</div>
    <a class="nav-item " href="home.html"><span class="icon">🏠</span> 首頁總覽</a>
    <div class="nav-section-label">學習與測驗</div>
    <a class="nav-item " href="quiz.html"><span class="icon">📝</span> 測驗專區</a>
    <a class="nav-item" href="#"><span class="icon">🎓</span> 教育訓練</a>
    <div class="nav-section-label">資料與公告</div>
    <a class="nav-item " href="docs.html"><span class="icon">📁</span> 文件宣導</a>
    <a class="nav-item " href="events-list.html"><span class="icon">🎉</span> 活動報名</a>
    <a class="nav-item " href="notice.html"><span class="icon">📢</span> 最新公告</a>
    <div class="nav-section-label">系統整合</div>
    <a class="nav-item active" href="links.html"><span class="icon">🔗</span> 相關系統連結</a>
  </nav>
  <div class="sidebar-footer">華美光學 人力營運處</div>
</aside>

<div id="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    </div>
    <div class="topbar-avatar">HR</div>
  </header>

  <main class="content">
    <div class="page-hero">
      <div class="page-hero-bg" style="background-image:url('https://lh3.googleusercontent.com/d/11mMlTi73o8ImtFI8u7EP9Smbyj8To2eP')"></div>
      <div class="page-hero-overlay"></div>
      <div class="page-hero-content">
        <div class="page-hero-title">🔗 相關系統連結</div>
        <div class="page-hero-desc">整合各部門常用系統與工具，一站式快速存取所有內部資源。</div>
      </div>
    </div>


    <!-- 目前顯示即將上線，之後填入連結後換成 links-grid -->
    <div class="coming-soon">
      <span class="cs-icon">🔧</span>
      <h2>系統連結整理中</h2>
      <p>人資部門正在彙整各系統連結，<br>即將上線，敬請期待！</p>
    </div>

  </main>
</div>

<script>
  function toggleSidebar() {
    const s=document.getElementById('sidebar');
    const o=document.getElementById('sidebar-overlay');
    const c=document.getElementById('sidebar-close');
    const open=s.classList.toggle('open');
    o.style.display=open?'block':'none';
    if(c) c.style.display=open?'block':'none';
  }
</script>
</body>
</html>
