<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>相關系統連結 — 華美光學人資系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      
      --accent: #f56a6a;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text-dark: #3d4449;
      --text-mid: #666;
      --text-light: #999;
      --border: #e8e8e8;
      
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text-dark); display: flex; min-height: 100vh; }

    
    
    
    
    
    
    
    
    
    
    
    
    

    
    
    
    
    
    
    
    
    .content { padding:32px; flex:1; }

    /* Hero */
    
    .links-hero::before { content:''; position:absolute; right:-60px; top:-60px; width:240px; height:240px; border-radius:50%; background:rgba(255,255,255,.06); }
    
    
    

    /* Coming soon */
    .coming-soon {
      background: var(--card-bg);
      border-radius: 16px;
      border: 2px dashed var(--border);
      padding: 60px;
      text-align: center;
      color: var(--text-light);
    }
    .coming-soon .cs-icon { font-size:56px; display:block; margin-bottom:16px; }
    .coming-soon h2 { font-size:18px; font-weight:700; color:var(--text-mid); margin-bottom:8px; }
    .coming-soon p { font-size:14px; line-height:1.7; }

    /* Links grid (for future use) */
    .links-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
    .link-card {
      background: var(--card-bg);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .link-card:hover { box-shadow:0 6px 20px rgba(0,0,0,.09); transform:translateY(-2px); }
    .link-icon { width:48px; height:48px; border-radius:12px; background:#f0f1f5; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
    .link-info h3 { font-size:15px; font-weight:700; margin-bottom:4px; }
    .link-info p { font-size:12px; color:var(--text-light); }
    .link-arrow { margin-left:auto; color:var(--text-light); font-size:18px; }

    

    @media (max-width:900px) { #sidebar{transform:translateX(-100%)} #sidebar.open{transform:translateX(0)} #sidebar-close{display:block!important} #main{margin-left:0} .menu-toggle{display:block} .links-grid{grid-template-columns:1fr} }
    @media (max-width:560px) { .content{padding:20px 16px} .hero-icon{display:none} .links-hero{padding:24px} .coming-soon{padding:40px 20px} }
  
    .page-hero {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      height: 120px;
      width: 100%;
    }
    .page-hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      width: 100%;
      height: 100%;
    }
    .page-hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
    }
    .page-hero-content {
      position: relative;
      z-index: 2;
      padding: 0 40px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .page-hero-title {
      font-size: 22px;
      font-weight: 900;
      color: #3d4449;
      margin-bottom: 4px;
      text-shadow: 0 1px 3px rgba(255,255,255,.6);
    }
    .page-hero-desc {
      font-size: 13px;
      color: #3d4449;
      font-weight: 500;
    }
  
    /* Layout fix */
    body { display:flex; min-height:100vh; }
    #main { margin-left:var(--sidebar-width,260px); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    @media (max-width:900px) { #main { margin-left:0; } }

      /* topbar 標題 */
    .topbar-brand {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      font-weight: 700;
      color: #3d4449;
      white-space: nowrap;
    }
    @media (max-width: 560px) {
      .topbar-brand { font-size: 14px; }
    }
  </style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar"></aside>

<div id="main">
  <header class="topbar"></header>

  <main class="content">
    <div class="page-hero">
      <div class="page-hero-bg" style="background-image:url('https://lh3.googleusercontent.com/d/11mMlTi73o8ImtFI8u7EP9Smbyj8To2eP')"></div>
      <div class="page-hero-overlay"></div>
      <div class="page-hero-content">
        <div class="page-hero-title" id="hero-title">🔗 相關系統連結</div>
        <div class="page-hero-desc">整合各部門常用系統與工具，一站式快速存取所有內部資源。</div>
      </div>
    </div>


    <!-- 密碼驗證畫面 -->
    <div id="auth-screen">
      <div style="max-width:400px;margin:60px auto;background:#fff;border-radius:16px;border:1px solid var(--border);padding:40px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08);">
        <div style="font-size:48px;margin-bottom:16px;">🔐</div>
        <h2 style="font-size:18px;font-weight:800;margin-bottom:8px;color:var(--text-dark);">需要驗證身份</h2>
        <p style="font-size:13px;color:var(--text-light);margin-bottom:24px;">此頁面僅限授權人員查看</p>
        <input type="password" id="pwd-input" placeholder="請輸入密碼"
          style="width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;margin-bottom:12px;outline:none;font-family:inherit;"
          onkeydown="if(event.key==='Enter')verifyPwd()" />
        <p id="pwd-error" style="color:#f56a6a;font-size:13px;margin-bottom:12px;display:none;">密碼錯誤，請重試</p>
        <button onclick="verifyPwd()"
          style="width:100%;background:#f56a6a;color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;">
          確認
        </button>
      </div>
    </div>

    <!-- 連結內容（驗證後顯示）-->
    <div id="links-screen" style="display:none;">
      <div id="links-loading" style="text-align:center;padding:60px;color:var(--text-light);">
        <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:#f56a6a;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;"></div>
        <p>載入連結中…</p>
      </div>
      <div class="links-grid" id="links-grid"></div>
      <div id="links-empty" style="display:none;text-align:center;padding:60px;color:var(--text-light);">
        <div style="font-size:48px;margin-bottom:12px;">🔗</div>
        <p>目前沒有連結</p>
      </div>
    </div>

  </main>
</div>

<script src="sheets-config.js"></script>
<script src="sidebar.js"></script>
<script src="topbar.js"></script>
<script>
const SHEET_ID = (typeof HRCONFIG !== 'undefined' && HRCONFIG.SHEETS_ID)
  ? HRCONFIG.SHEETS_ID
  : '1b4xq2XxSCbuIF6SZU-x0Jz4Du_n-YRAJCSQrkm2ze3U';

const SHEET_TAB = '系統連結';

// 讀取 URL 參數取得連結名稱
const linkName = new URLSearchParams(location.search).get('name') || '';

// 顯示連結名稱在驗證頁
if (linkName) {
  document.addEventListener('DOMContentLoaded', () => {
    const h2 = document.querySelector('#auth-screen h2');
    if (h2) h2.textContent = linkName;
  });
}

let sheetData = null;

async function verifyPwd() {
  const input = document.getElementById('pwd-input').value.trim();
  document.getElementById('pwd-error').style.display = 'none';

  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_TAB)}&headers=0`;
    const res = await fetch(url);
    const text = await res.text();
    const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
    if (!match) throw new Error('無法讀取');
    const json = JSON.parse(match[1]);
    const pwd = json.table.rows[0]?.c[1]?.v?.toString().trim();

    if (input === pwd) {
      sheetData = json;
      if (linkName) {
        // 找到對應連結網址並跳轉
        const rows = json.table.rows.slice(2);
        const target = rows.find(r => r.c && r.c[0]?.v === linkName);
        const targetUrl = target?.c[2]?.v || '';
        if (targetUrl) {
          window.location.href = targetUrl;
        } else {
          alert('此連結尚未設定網址');
        }
      } else {
        // 無 name 參數：顯示連結清單
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('links-screen').style.display = 'block';
        loadLinks(json);
      }
    } else {
      document.getElementById('pwd-error').style.display = 'block';
      document.getElementById('pwd-input').value = '';
    }
  } catch(e) {
    alert('驗證失敗，請稍後再試');
  }
}

function loadLinks(json) {
  const rows = json.table.rows.slice(2);
  const links = rows
    .filter(r => r.c && r.c[0]?.v)
    .map(r => ({
      name   : r.c[0]?.v || '',
      desc   : r.c[1]?.v || '',
      url    : r.c[2]?.v || '',
      status : r.c[3]?.v || '',
    }));

  document.getElementById('links-loading').style.display = 'none';

  if (links.length === 0) {
    document.getElementById('links-empty').style.display = 'block';
    return;
  }

  const grid = document.getElementById('links-grid');
  grid.innerHTML = '';
  links.forEach(l => {
    const isOpen = l.status !== '已停用';
    const card = document.createElement('a');
    card.href = isOpen && l.url ? l.url : '#';
    card.target = '_blank';
    card.className = 'link-card';
    if (!isOpen) card.style.opacity = '0.5';
    card.innerHTML = `
      <div class="link-icon">📊</div>
      <div class="link-info">
        <h3>${l.name}</h3>
        ${l.desc ? `<p>${l.desc}</p>` : ''}
      </div>
      <div class="link-arrow">→</div>`;
    grid.appendChild(card);
  });
}
</script>
</body>
</html>
