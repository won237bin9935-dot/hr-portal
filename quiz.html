<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>測驗專區 — 華美光學人資系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
       --accent: #f56a6a; --bg: #f8f9fa;
      --card-bg: #fff; --text-dark: #3d4449; --text-mid: #666;
      --text-light: #999; --border: #e8e8e8; 
      --quiz-color: #7c3aed; --quiz-light: #f3eeff;
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text-dark); display:flex; min-height:100vh; }
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    
    .content { padding:32px; flex:1; }

    /* Hero - same height as home */
    
    .quiz-hero::before { content:''; position:absolute; right:-60px; top:-60px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,.06); }
    
    
    

    /* Filter */
    .list-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
    .list-header h2 { font-size:15px; font-weight:700; color:var(--text-mid); }
    .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; }
    .tab { padding:6px 16px; border-radius:30px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:var(--card-bg); color:var(--text-mid); transition:all .18s; }
    .tab:hover { border-color:var(--quiz-color); color:var(--quiz-color); }
    .tab.active { background:var(--quiz-color); border-color:var(--quiz-color); color:#fff; }

    /* Quiz grid - 3 col, styled cards */
    .quiz-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }

    .quiz-card {
      background: #ffffff;
      border-radius:14px;
      border:1px solid var(--qc-border, #ddd6fe);
      border-left: 4px solid var(--qc-primary, #7c3aed);
      padding:22px; transition:all .2s; position:relative; overflow:hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .quiz-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--qc-primary, #7c3aed); transform:scaleX(0); transform-origin:left; transition:transform .25s; }
    .quiz-card:hover { box-shadow:0 6px 20px rgba(0,0,0,.12); transform:translateY(-2px); }
    .quiz-card:hover::before { transform:scaleX(1); }

    .quiz-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
    .quiz-icon { width:46px; height:46px; background:var(--qc-light, #f3eeff); border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .quiz-status { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .quiz-status.open { background:#dcfce7; color:#16a34a; border:1px solid #bbf7d0; }
    .quiz-status.soon { background:#fef9c3; color:#ca8a04; border:1px solid #fde68a; }
    .quiz-status.closed { background:#f1f5f9; color:#94a3b8; border:1px solid #e2e8f0; }

    .quiz-card h3 { font-size:17px; font-weight:800; margin-bottom:4px; line-height:1.3; color:var(--text-dark); }
    .quiz-target { font-size:15px; color:var(--text-light); margin-bottom:12px; }
    .quiz-meta { display:flex; gap:14px; margin-bottom:14px; }
    .quiz-meta-item { display:flex; align-items:center; gap:5px; font-size:15px; color:var(--text-mid); }
    .quiz-deadline { font-size:12px; color:var(--text-light); margin-bottom:14px; }
    .quiz-deadline strong { color:var(--accent); }

    .btn-quiz { display:inline-flex; align-items:center; gap:6px; background:var(--qc-primary, #7c3aed); color:#fff; font-size:13px; font-weight:700; padding:10px 22px; border-radius:30px; text-decoration:none; transition:all .18s; border:none; cursor:pointer; box-shadow:0 3px 10px rgba(0,0,0,.15); }
    .btn-quiz:hover { filter:brightness(1.1); transform:translateY(-2px); box-shadow:0 6px 16px rgba(0,0,0,.2); }
    .btn-quiz.disabled { background:#c4b5fd; pointer-events:none; }
    .btn-quiz.closed-btn { background:#94a3b8; pointer-events:none; }

    .loading { text-align:center; padding:60px; color:var(--text-light); }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--quiz-color); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty-state { text-align:center; padding:40px; color:var(--text-light); grid-column:1/-1; }
    .empty-state .ei { font-size:40px; display:block; margin-bottom:10px; }

    

    @media (max-width:1100px) { .quiz-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:900px) { #sidebar{transform:translateX(-100%)} #sidebar.open{transform:translateX(0)} #sidebar-close{display:block!important} #main{margin-left:0} .menu-toggle{display:block} }
    @media (max-width:560px) { .content{padding:20px 16px} .quiz-grid{grid-template-columns:1fr} .hero-icon{display:none} }
  
    .page-hero {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      height: 120px;
      width: 100%;
    }
    .page-hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      width: 100%;
      height: 100%;
    }
    .page-hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
    }
    .page-hero-content {
      position: relative;
      z-index: 2;
      padding: 0 40px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .page-hero-title {
      font-size: 22px;
      font-weight: 900;
      color: #3d4449;
      margin-bottom: 4px;
      text-shadow: 0 1px 3px rgba(255,255,255,.6);
    }
    .page-hero-desc {
      font-size: 13px;
      color: #3d4449;
      font-weight: 500;
    }
  
    /* Layout fix */
    body { display:flex; min-height:100vh; }
    #main { margin-left:var(--sidebar-width,260px); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    @media (max-width:900px) { #main { margin-left:0; } }

  </style>
</head>
<body>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
  <div class="sidebar-header">
    <img src="https://lh3.googleusercontent.com/d/1VFVjgXLuw7v6yEPLi_BnF2zRXEhah8UQ" alt="華美光學" style="height:44px;object-fit:contain;flex-shrink:0;">
    <button onclick="toggleSidebar()" id="sidebar-close">✕</button>
  </div>
  <nav>
    <div class="nav-section-label">主選單</div>
    <a class="nav-item " href="home.html"><span class="icon">🏠</span> 首頁總覽</a>
    <div class="nav-section-label">學習與測驗</div>
    <a class="nav-item active" href="quiz.html"><span class="icon">📝</span> 測驗專區</a>
    <a class="nav-item" href="#"><span class="icon">🎓</span> 教育訓練</a>
    <div class="nav-section-label">資料與公告</div>
    <a class="nav-item " href="docs.html"><span class="icon">📁</span> 文件宣導</a>
    <a class="nav-item " href="events-list.html"><span class="icon">🎉</span> 活動報名</a>
    <a class="nav-item " href="notice.html"><span class="icon">📢</span> 最新公告</a>
    <div class="nav-section-label">系統整合</div>
    <a class="nav-item " href="links.html"><span class="icon">🔗</span> 相關系統連結</a>
  </nav>
  <div class="sidebar-footer">華美光學 人力營運處</div>
</aside>

<div id="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    </div>
    <div class="topbar-avatar">HR</div>
  </header>
  <main class="content">
    <div class="page-hero">
      <div class="page-hero-bg" style="background-image:url('https://lh3.googleusercontent.com/d/1L9yZHFQI79vbtEDh6-b_O8ljDOpBx7sr')"></div>
      <div class="page-hero-overlay"></div>
      <div class="page-hero-content">
        <div class="page-hero-title">📝 測驗專區</div>
        <div class="page-hero-desc">完成各項線上測驗，提升專業知識與工作技能，請依規定期限完成指定測驗。</div>
      </div>
    </div>


    <div class="list-header">
      <h2>所有測驗</h2>
      <div class="filter-tabs">
        <div class="tab active" onclick="filterQuiz('all',this)">全部</div>
        <div class="tab" onclick="filterQuiz('開放中',this)">開放中</div>
        <div class="tab" onclick="filterQuiz('即將開始',this)">即將開始</div>
        <div class="tab" onclick="filterQuiz('已截止',this)">已截止</div>
      </div>
    </div>

    <div id="quiz-loading" class="loading"><div class="spinner"></div><p>載入測驗資料中…</p></div>
    <div class="quiz-grid" id="quiz-grid"></div>
  </main>
</div>

<script src="sheets-config.js"></script>
<script>
  function toggleSidebar() {
    const s=document.getElementById('sidebar');
    const o=document.getElementById('sidebar-overlay');
    const c=document.getElementById('sidebar-close');
    const open=s.classList.toggle('open');
    o.style.display=open?'block':'none';
    if(c) c.style.display=open?'block':'none';
  }

  let allQuiz=[];

  async function loadQuiz() {
    const rows=await fetchSheet(HRCONFIG.SHEETS.QUIZ);
    allQuiz=rows.filter(r=>r['測驗名稱']);
    document.getElementById('quiz-loading').style.display='none';
    renderQuiz('all');
  }

  function renderQuiz(filter) {
    const grid=document.getElementById('quiz-grid');
    grid.innerHTML='';
    quizColorIndex = 0;
    const filtered=filter==='all'?allQuiz:allQuiz.filter(q=>q['狀態']===filter);
    if(filtered.length===0){
      grid.innerHTML='<div class="empty-state"><span class="ei">📝</span><p>目前沒有符合條件的測驗</p></div>';
      return;
    }
    filtered.forEach(q=>grid.appendChild(buildQuizCard(q)));
  }

  // 12色自動輪流
  const QUIZ_COLORS = [
    { primary: '#2980b9', light: '#e8f3fb', border: '#bee3f8' }, // 藍綠
    { primary: '#26c067', light: '#e8faf0', border: '#b2f0d0' }, // 草綠
    { primary: '#ff7512', light: '#fff0e0', border: '#ffd5a0' }, // 亮橘
    { primary: '#9b59b6', light: '#f5eeff', border: '#ddb8f5' }, // 紫
    { primary: '#f56a6a', light: '#fff0f0', border: '#ffc0c0' }, // 珊瑚紅
    { primary: '#16acd0', light: '#e0f7fc', border: '#a0e4f5' }, // 湖水綠
    { primary: '#f0a500', light: '#fff7e0', border: '#ffd980' }, // 暖黃
    { primary: '#e74c3c', light: '#fdecea', border: '#f5b8b8' }, // 鮮紅
    { primary: '#1a3a6e', light: '#e8eef8', border: '#b0c4e8' }, // 深藍
    { primary: '#11734b', light: '#e0f5ec', border: '#90dab8' }, // 翠綠
    { primary: '#8e44ad', light: '#f3e8fb', border: '#d0a0f0' }, // 深紫
    { primary: '#7f8c1d', light: '#f4f6e0', border: '#d0d888' }, // 橄欖綠
  ];
  let quizColorIndex = 0;

  function buildQuizCard(q) {
    const isOpen=q['狀態']==='開放中';
    const isSoon=q['狀態']==='即將開始';
    const isClosed=q['狀態']==='已截止';
    const hasLink=q['表單連結']&&q['表單連結'].trim();
    const statusCls=isOpen?'open':isSoon?'soon':'closed';

    const color = QUIZ_COLORS[quizColorIndex % QUIZ_COLORS.length];
    quizColorIndex++;
    const card=document.createElement('div');
    card.className='quiz-card';
    card.style.setProperty('--qc-primary', color.primary);
    card.style.setProperty('--qc-light', color.light);
    card.style.setProperty('--qc-border', color.border);
    card.innerHTML=`
      <div class="quiz-card-top">
        <div class="quiz-icon">📝</div>
        <span class="quiz-status ${statusCls}">${q['狀態']||'開放中'}</span>
      </div>
      <h3>${q['測驗名稱']}</h3>
      <div class="quiz-target">👥 適用對象：${q['適用對象']||'全體員工'}</div>
      <div class="quiz-meta">
        ${q['題數']?`<div class="quiz-meta-item">📋 ${q['題數']} 題</div>`:''}
        ${q['預估時間']?`<div class="quiz-meta-item">⏱️ 約 ${q['預估時間']} 分鐘</div>`:''}
      </div>
      ${q['截止日期']?`<div class="quiz-deadline">截止日期：<strong>${formatSheetDate(q['截止日期'])||q['截止日期']}</strong></div>`:''}
      ${q['備註']?`<div class="quiz-deadline">${q['備註']}</div>`:''}
      <div>
        ${hasLink&&!isClosed
          ?`<a href="${q['表單連結']}" target="_blank" class="btn-quiz">開始測驗 →</a>`
          :isClosed
            ?`<span class="btn-quiz closed-btn">已截止</span>`
            :`<span class="btn-quiz disabled">即將開放</span>`
        }
      </div>`;
    return card;
  }

  function filterQuiz(filter,el) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderQuiz(filter);
  }

  loadQuiz();
</script>
</body>
</html>
