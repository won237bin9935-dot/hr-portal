<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>測驗專區 — 華美光學人資系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sidebar-bg: #2e3141; --accent: #f56a6a; --bg: #f5f4f0;
      --card-bg: #fff; --text-dark: #333; --text-mid: #666;
      --text-light: #999; --border: #e4e2de; --sidebar-width: 260px;
      --quiz-color: #7c3aed; --quiz-light: #f3eeff;
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text-dark); display:flex; min-height:100vh; }
    #sidebar { width:var(--sidebar-width); background:var(--sidebar-bg); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:100; transition:transform .3s; }
    .sidebar-header { padding:28px 24px 20px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; align-items:center; }
    .logo-icon { width:40px; height:40px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
    .logo-text { color:#fff; font-size:15px; font-weight:700; line-height:1.3; margin-left:12px; }
    .logo-sub { color:rgba(255,255,255,.45); font-size:11px; display:block; margin-top:2px; }
    #sidebar-close { display:none; background:none; border:none; color:rgba(255,255,255,.5); font-size:22px; cursor:pointer; margin-left:auto; }
    nav { flex:1; overflow-y:auto; padding:16px 0; }
    .nav-section-label { color:rgba(255,255,255,.3); font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:16px 24px 6px; }
    .nav-item { display:flex; align-items:center; gap:12px; padding:11px 24px; color:rgba(255,255,255,.65); border-left:3px solid transparent; transition:all .18s; font-size:14px; text-decoration:none; }
    .nav-item:hover { background:rgba(255,255,255,.06); color:#fff; }
    .nav-item.active { background:rgba(245,106,106,.12); border-left-color:var(--accent); color:#fff; }
    .nav-item .icon { font-size:17px; width:22px; text-align:center; flex-shrink:0; }
    .sidebar-footer { padding:16px 24px; border-top:1px solid rgba(255,255,255,.08); color:rgba(255,255,255,.3); font-size:11px; }
    #main { margin-left:var(--sidebar-width); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    .topbar { background:var(--card-bg); border-bottom:1px solid var(--border); padding:0 32px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
    .topbar-left { display:flex; align-items:center; gap:12px; }
    .topbar-title { font-size:16px; font-weight:700; }
    .breadcrumb { font-size:12px; color:var(--text-light); }
    .breadcrumb a { color:var(--text-light); text-decoration:none; }
    .topbar-avatar { width:34px; height:34px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; font-weight:700; }
    .menu-toggle { display:none; background:none; border:none; font-size:22px; cursor:pointer; color:var(--text-dark); }
    .content { padding:32px; flex:1; }

    /* Hero - same height as home */
    .quiz-hero { background:linear-gradient(135deg,#4c1d95 0%,#7c3aed 60%,#a855f7 100%); border-radius:16px; padding:22px 32px; margin-bottom:24px; color:#fff; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:space-between; }
    .quiz-hero::before { content:''; position:absolute; right:-60px; top:-60px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,.06); }
    .hero-text h1 { font-size:22px; font-weight:900; margin-bottom:4px; }
    .hero-text p { font-size:13px; opacity:.8; }
    .hero-icon { font-size:60px; opacity:.2; position:absolute; right:40px; }

    /* Filter */
    .list-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
    .list-header h2 { font-size:15px; font-weight:700; color:var(--text-mid); }
    .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; }
    .tab { padding:6px 16px; border-radius:30px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:var(--card-bg); color:var(--text-mid); transition:all .18s; }
    .tab:hover { border-color:var(--quiz-color); color:var(--quiz-color); }
    .tab.active { background:var(--quiz-color); border-color:var(--quiz-color); color:#fff; }

    /* Quiz grid - 3 col, styled cards */
    .quiz-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }

    .quiz-card {
      background: linear-gradient(160deg, #faf8ff 0%, #ede9fe 100%);
      border-radius:14px; border:1px solid #ddd6fe;
      padding:22px; transition:all .2s; position:relative; overflow:hidden;
    }
    .quiz-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--quiz-color); transform:scaleX(0); transform-origin:left; transition:transform .2s; }
    .quiz-card:hover { box-shadow:0 6px 20px rgba(124,58,237,.15); transform:translateY(-2px); }
    .quiz-card:hover::before { transform:scaleX(1); }

    .quiz-card-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:12px; }
    .quiz-icon { width:46px; height:46px; background:white; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 2px 8px rgba(124,58,237,.15); }
    .quiz-status { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; }
    .quiz-status.open { background:#dcfce7; color:#16a34a; }
    .quiz-status.soon { background:#fef9c3; color:#ca8a04; }
    .quiz-status.closed { background:#f1f5f9; color:#94a3b8; }

    .quiz-card h3 { font-size:15px; font-weight:800; margin-bottom:4px; line-height:1.3; color:var(--text-dark); }
    .quiz-target { font-size:12px; color:var(--text-light); margin-bottom:12px; }
    .quiz-meta { display:flex; gap:14px; margin-bottom:14px; }
    .quiz-meta-item { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-mid); }
    .quiz-deadline { font-size:12px; color:var(--text-light); margin-bottom:14px; }
    .quiz-deadline strong { color:var(--accent); }

    .btn-quiz { display:inline-flex; align-items:center; gap:6px; background:var(--quiz-color); color:#fff; font-size:13px; font-weight:700; padding:9px 20px; border-radius:30px; text-decoration:none; transition:all .18s; border:none; cursor:pointer; }
    .btn-quiz:hover { background:#6d28d9; transform:translateY(-1px); }
    .btn-quiz.disabled { background:#c4b5fd; pointer-events:none; }
    .btn-quiz.closed-btn { background:#94a3b8; pointer-events:none; }

    .loading { text-align:center; padding:60px; color:var(--text-light); }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--quiz-color); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty-state { text-align:center; padding:40px; color:var(--text-light); grid-column:1/-1; }
    .empty-state .ei { font-size:40px; display:block; margin-bottom:10px; }

    #sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:99; }

    @media (max-width:1100px) { .quiz-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:900px) { #sidebar{transform:translateX(-100%)} #sidebar.open{transform:translateX(0)} #sidebar-close{display:block} #main{margin-left:0} .menu-toggle{display:block} }
    @media (max-width:560px) { .content{padding:20px 16px} .quiz-grid{grid-template-columns:1fr} .hero-icon{display:none} }
  </style>
</head>
<body>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">🏢</div>
    <div class="logo-text">華美光學<span class="logo-sub">人資入口網站</span></div>
    <button onclick="toggleSidebar()" id="sidebar-close">✕</button>
  </div>
  <nav>
    <div class="nav-section-label">主選單</div>
    <a class="nav-item" href="home.html"><span class="icon">🏠</span> 首頁總覽</a>
    <div class="nav-section-label">學習與測驗</div>
    <a class="nav-item active" href="quiz.html"><span class="icon">📝</span> 測驗專區</a>
    <a class="nav-item" href="#"><span class="icon">🎓</span> 教育訓練</a>
    <div class="nav-section-label">資料與公告</div>
    <a class="nav-item" href="docs.html"><span class="icon">📁</span> 文件宣導</a>
    <a class="nav-item" href="events-list.html"><span class="icon">🎉</span> 活動報名</a>
    <a class="nav-item" href="notice.html"><span class="icon">📢</span> 最新公告</a>
    <div class="nav-section-label">系統整合</div>
    <a class="nav-item" href="links.html"><span class="icon">🔗</span> 相關系統連結</a>
  </nav>
  <div class="sidebar-footer">© 2025 華美光學　人資部</div>
</aside>

<div id="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div>
        <div class="topbar-title">測驗專區</div>
        <div class="breadcrumb"><a href="home.html">首頁</a> › 測驗專區</div>
      </div>
    </div>
    <div class="topbar-avatar">HR</div>
  </header>
  <main class="content">
    <div class="quiz-hero">
      <div class="hero-text">
        <h1>📝 測驗專區</h1>
        <p>完成各項線上測驗，提升專業知識與工作技能，請依規定期限完成指定測驗。</p>
      </div>
      <div class="hero-icon">🎯</div>
    </div>

    <div class="list-header">
      <h2>所有測驗</h2>
      <div class="filter-tabs">
        <div class="tab active" onclick="filterQuiz('all',this)">全部</div>
        <div class="tab" onclick="filterQuiz('開放中',this)">開放中</div>
        <div class="tab" onclick="filterQuiz('即將開始',this)">即將開始</div>
        <div class="tab" onclick="filterQuiz('已截止',this)">已截止</div>
      </div>
    </div>

    <div id="quiz-loading" class="loading"><div class="spinner"></div><p>載入測驗資料中…</p></div>
    <div class="quiz-grid" id="quiz-grid"></div>
  </main>
</div>

<script src="sheets-config.js"></script>
<script>
  function toggleSidebar() {
    const s=document.getElementById('sidebar'),o=document.getElementById('sidebar-overlay'),c=document.getElementById('sidebar-close');
    const open=s.classList.toggle('open');
    o.style.display=open?'block':'none';
    c.style.display=open?'block':'none';
  }

  let allQuiz=[];

  async function loadQuiz() {
    const rows=await fetchSheet(HRCONFIG.SHEETS.QUIZ);
    allQuiz=rows.filter(r=>r['測驗名稱']);
    document.getElementById('quiz-loading').style.display='none';
    renderQuiz('all');
  }

  function renderQuiz(filter) {
    const grid=document.getElementById('quiz-grid');
    grid.innerHTML='';
    const filtered=filter==='all'?allQuiz:allQuiz.filter(q=>q['狀態']===filter);
    if(filtered.length===0){
      grid.innerHTML='<div class="empty-state"><span class="ei">📝</span><p>目前沒有符合條件的測驗</p></div>';
      return;
    }
    filtered.forEach(q=>grid.appendChild(buildQuizCard(q)));
  }

  function buildQuizCard(q) {
    const isOpen=q['狀態']==='開放中';
    const isSoon=q['狀態']==='即將開始';
    const isClosed=q['狀態']==='已截止';
    const hasLink=q['表單連結']&&q['表單連結'].trim();
    const statusCls=isOpen?'open':isSoon?'soon':'closed';

    const card=document.createElement('div');
    card.className='quiz-card';
    card.innerHTML=`
      <div class="quiz-card-top">
        <div class="quiz-icon">📝</div>
        <span class="quiz-status ${statusCls}">${q['狀態']||'開放中'}</span>
      </div>
      <h3>${q['測驗名稱']}</h3>
      <div class="quiz-target">👥 適用對象：${q['適用對象']||'全體員工'}</div>
      <div class="quiz-meta">
        ${q['題數']?`<div class="quiz-meta-item">📋 ${q['題數']} 題</div>`:''}
        ${q['預估時間']?`<div class="quiz-meta-item">⏱️ 約 ${q['預估時間']} 分鐘</div>`:''}
      </div>
      ${q['截止日期']?`<div class="quiz-deadline">截止日期：<strong>${formatSheetDate(q['截止日期'])||q['截止日期']}</strong></div>`:''}
      ${q['備註']?`<div class="quiz-deadline">${q['備註']}</div>`:''}
      <div>
        ${hasLink&&!isClosed
          ?`<a href="${q['表單連結']}" target="_blank" class="btn-quiz">開始測驗 →</a>`
          :isClosed
            ?`<span class="btn-quiz closed-btn">已截止</span>`
            :`<span class="btn-quiz disabled">即將開放</span>`
        }
      </div>`;
    return card;
  }

  function filterQuiz(filter,el) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderQuiz(filter);
  }

  loadQuiz();
</script>
</body>
</html>
