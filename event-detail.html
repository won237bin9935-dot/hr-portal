<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>活動詳情 — 華美光學人資系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      
      --accent: #f56a6a;
      --bg: #f8f9fa;
      --card-bg: #fff;
      --text-dark: #3d4449;
      --text-mid: #666;
      --text-light: #999;
      --border: #e8e8e8;
      
      --event-primary: #1a7fbf;
      --event-dark: #0d5f8f;
      --event-light: #e8f4fc;
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text-dark); display: flex; min-height: 100vh; }

    
    
    
    
    
    
    
    
    
    
    
    
    

    
    
    
    
    
    
    
    
    .content { padding:32px; flex:1; }
    .back-link { display:inline-flex; align-items:center; gap:6px; color:var(--text-light); font-size:13px; text-decoration:none; margin-bottom:24px; transition:color .18s; }
    .back-link:hover { color:var(--accent); }

    .event-layout { display:grid; grid-template-columns:320px 1fr; gap:28px; align-items:start; }

    /* Poster */
    .poster-col { position:sticky; top:80px; }
    .poster-wrap { background:var(--card-bg); border-radius:16px; border:1px solid var(--border); overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,.08); }
    .poster-img-area { width:100%; aspect-ratio:3/4; position:relative; overflow:hidden; background:var(--event-light); display:flex; align-items:center; justify-content:center; }
    .poster-img-area img { width:100%; height:100%; object-fit:contain; }
    .poster-placeholder-msg { text-align:center; color:var(--text-light); padding:24px; }
    .poster-placeholder-msg .pp { font-size:48px; display:block; margin-bottom:12px; }
    .poster-actions { padding:14px 16px; display:flex; gap:8px; }
    .btn-dl { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; background:var(--event-light); color:#000000; border:1.5px solid var(--event-primary); border-radius:8px; padding:9px; font-size:13px; font-weight:600; text-decoration:none; transition:all .18s; }
    .btn-dl:hover { background:var(--event-primary); color:#000000; }

    /* Info */
    .info-col { display:flex; flex-direction:column; gap:20px; }
    .title-card { background:linear-gradient(135deg, var(--event-dark), var(--event-primary)); border-radius:16px; padding:28px 32px; color:#fff; position:relative; overflow:hidden; }
    .title-card::after { content:''; position:absolute; right:-40px; top:-40px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.06); }
    .event-category { font-size:12px; font-weight:700; letter-spacing:.1em; opacity:.75; margin-bottom:8px; text-transform:uppercase; }
    .event-title { font-size:28px; font-weight:900; line-height:1.2; margin-bottom:6px; }
    .event-subtitle { font-size:15px; opacity:.75; }

    .status-bar { display:flex; align-items:center; gap:12px; padding:14px 20px; background:#e8faf0; border-radius:10px; border:1px solid #b7efd0; }
    .status-dot { width:8px; height:8px; border-radius:50%; background:#27ae60; animation:pulse 2s infinite; flex-shrink:0; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }
    .status-text { font-size:14px; font-weight:700; color:#27ae60; }
    .status-note { font-size:13px; color:var(--text-mid); margin-left:auto; }

    .meta-card { background:var(--card-bg); border-radius:14px; border:1px solid var(--border); overflow:hidden; }
    .meta-card-header { padding:14px 20px; border-bottom:1px solid var(--border); font-size:17px; font-weight:800; color:var(--text-mid); }
    .meta-grid { display:flex; flex-direction:column; }
    .meta-cell { padding:12px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; }
    
    .meta-cell:last-child { border-bottom:none; }
    .meta-cell-label { font-size:13px; color:var(--text-light); min-width:80px; flex-shrink:0; }
    .meta-cell-value { font-size:15px; font-weight:800; color:var(--text-dark); }

    .section-card { background:var(--card-bg); border-radius:14px; border:1px solid var(--border); overflow:hidden; }
    .section-card-header { padding:16px 20px; border-bottom:1px solid var(--border); font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
    .section-card-body { padding:20px; }
    .activity-list { display:flex; flex-direction:column; gap:14px; }
    .activity-item { display:flex; gap:14px; align-items:flex-start; }
    .activity-num { width:30px; height:30px; background:var(--event-light); color:var(--event-primary); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; flex-shrink:0; }
    .activity-text { flex:1; padding-top:5px; font-size:14px; line-height:1.6; }
    .notice-list { display:flex; flex-direction:column; gap:10px; }
    .notice-row { display:flex; gap:10px; font-size:13px; color:var(--text-mid); line-height:1.6; }

    .btn-register { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; background:linear-gradient(135deg, var(--event-dark), var(--event-primary)); color:#2e2e2e; font-size:16px; font-weight:800; padding:16px; border-radius:12px; text-decoration:none; transition:all .2s; box-shadow:0 6px 20px rgba(0,0,0,.15); }
    .btn-register:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(0,0,0,.2); }
    .register-note { text-align:center; font-size:12px; color:var(--text-light); margin-top:10px; line-height:1.7; }

    .loading { text-align:center; padding:80px 24px; color:var(--text-light); }
    .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }

    

    @media (max-width:900px) { #sidebar{transform:translateX(-100%)} #sidebar.open{transform:translateX(0)} #sidebar-close{display:block!important} #main{margin-left:0} .menu-toggle{display:block} .event-layout{grid-template-columns:1fr} .poster-col{position:static} .poster-img-area{aspect-ratio:unset;max-height:400px} }
    @media (max-width:560px) { .content{padding:20px 16px} .meta-grid{grid-template-columns:1fr} .meta-cell{border-right:none} .meta-cell:nth-last-child(-n+2){border-bottom:1px solid var(--border)} .meta-cell:last-child{border-bottom:none} }
  
    /* Layout fix */
    body { display:flex; min-height:100vh; }
    #main { margin-left:var(--sidebar-width,260px); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    @media (max-width:900px) { #main { margin-left:0; } }

  </style>
</head>
<body>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
  <div class="sidebar-header">
    <img src="https://lh3.googleusercontent.com/d/1VFVjgXLuw7v6yEPLi_BnF2zRXEhah8UQ" alt="華美光學">
    <div class="logo-text">華美光學<span class="logo-sub">人力資源系統</span></div>
    <button onclick="toggleSidebar()" id="sidebar-close">✕</button>
  </div>
  <nav>
    <div class="nav-section-label">主選單</div>
    <a class="nav-item " href="home.html"><span class="icon">🏠</span> 首頁總覽</a>
    <div class="nav-section-label">學習與測驗</div>
    <a class="nav-item " href="quiz.html"><span class="icon">📝</span> 測驗專區</a>
    <a class="nav-item" href="#"><span class="icon">🎓</span> 教育訓練</a>
    <div class="nav-section-label">資料與公告</div>
    <a class="nav-item " href="docs.html"><span class="icon">📁</span> 文件宣導</a>
    <a class="nav-item active" href="events-list.html"><span class="icon">🎉</span> 活動報名</a>
    <a class="nav-item " href="notice.html"><span class="icon">📢</span> 最新公告</a>
    <div class="nav-section-label">系統整合</div>
    <a class="nav-item " href="links.html"><span class="icon">🔗</span> 相關系統連結</a>
  </nav>
  <div class="sidebar-footer">華美光學 人力營運處</div>
</aside>

<div id="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    </div>
    <div class="topbar-avatar">HR</div>
  </header>

  <main class="content">
    <a href="events-list.html" class="back-link">← 返回活動列表</a>
    <div id="loading" class="loading"><div class="spinner"></div><p>載入活動資料中…</p></div>
    <div id="event-content" style="display:none"></div>
  </main>
</div>

<script src="sheets-config.js"></script>
<script>
  function toggleSidebar() {
    const s=document.getElementById('sidebar');
    const o=document.getElementById('sidebar-overlay');
    const c=document.getElementById('sidebar-close');
    const open=s.classList.toggle('open');
    o.style.display=open?'block':'none';
    if(c) c.style.display=open?'block':'none';
  }

  async function loadEvent() {
    const params = new URLSearchParams(window.location.search);
    const name = params.get('event');
    if (!name) { window.location.href = 'events-list.html'; return; }

    const rows = await fetchSheet(HRCONFIG.SHEETS.EVENTS);
    const e = rows.find(r => r['活動名稱'] === decodeURIComponent(name));
    if (!e) { window.location.href = 'events-list.html'; return; }

    // Apply color
    applyEventColor(e['預設主題'], e['自訂色碼']);

    // Update titles
    document.title = e['活動名稱'] + ' — 華美光學人資系統';
    const topbarName = document.getElementById('topbar-name');
    if(topbarName) topbarName.textContent = e['活動名稱'];
    const breadcrumbName = document.getElementById('breadcrumb-name');
    if(breadcrumbName) breadcrumbName.textContent = e['活動名稱'];

    // Build activity items
    const activities = (e['活動內容'] || '').split('\n').filter(s => s.trim());
    const actHTML = activities.map((a, i) =>
      `<div class="activity-item"><div class="activity-num">${i+1}</div><div class="activity-text">${a.trim()}</div></div>`
    ).join('');

    // Build notice items
    const notices = (e['注意事項'] || '').split('\n').filter(s => s.trim());
    const noticeHTML = notices.map(n =>
      `<div class="notice-row"><span>📌</span><span>${n.trim()}</span></div>`
    ).join('');

    // Status bar color
    const isOpen = e['狀態'] === '報名中';
    const statusColor = isOpen ? '#27ae60' : '#f0a500';
    const statusBg    = isOpen ? '#e8faf0' : '#fff7e0';
    const statusBorder= isOpen ? '#b7efd0' : '#ffe0a0';

    const hasPoster = e['海報連結'] && e['海報連結'].trim();
    const hasForm   = e['表單連結'] && e['表單連結'].trim();

    document.getElementById('event-content').innerHTML = `
      <div class="event-layout">
        <div class="poster-col">
          <div class="poster-wrap">
            <div class="poster-img-area">
              ${hasPoster
                ? `<img src="${e['海報連結']}" alt="${e['活動名稱']}" onerror="this.parentElement.innerHTML='<div class=poster-placeholder-msg><span class=pp>🖼️</span><p>海報載入失敗</p></div>'">`
                : `<div class="poster-placeholder-msg"><span class="pp">🎉</span><p>海報製作中</p></div>`}
            </div>
            ${hasPoster ? `<div class="poster-actions"><a href="${e['海報連結']}" class="btn-dl" target="_blank">⬇ 下載海報</a></div>` : ''}
          </div>
        </div>

        <div class="info-col">
          <div class="title-card">
            <div class="event-category">${e['類別'] || '公司活動'}</div>
            <div class="event-title">${e['活動名稱']}</div>
            ${e['副標題'] ? `<div class="event-subtitle">${e['副標題']}</div>` : ''}
          </div>

          <div class="status-bar" style="background:${statusBg};border-color:${statusBorder}">
            <div class="status-dot" style="background:${statusColor}"></div>
            <span class="status-text" style="color:${statusColor}">${e['狀態']}</span>
            ${e['報名截止日'] ? `<span class="status-note">截止日期：${e['報名截止日']}</span>` : ''}
          </div>

          <div class="meta-card">
            <div class="meta-card-header">📋 活動資訊</div>
            <div class="meta-grid">
              <div class="meta-cell"><div class="meta-cell-label">活動日期</div><div class="meta-cell-value">${e['日期'] || '待定'}</div></div>
              <div class="meta-cell"><div class="meta-cell-label">活動時間</div><div class="meta-cell-value">${e['時間'] || '待定'}</div></div>
              <div class="meta-cell"><div class="meta-cell-label">活動地點</div><div class="meta-cell-value">${e['地點'] || '待定'}</div></div>
              <div class="meta-cell"><div class="meta-cell-label">參加對象</div><div class="meta-cell-value">${e['參加對象'] || '全體員工'}</div></div>
            </div>
          </div>

          ${actHTML ? `
          <div class="section-card">
            <div class="section-card-header">🎯 活動內容</div>
            <div class="section-card-body"><div class="activity-list">${actHTML}</div></div>
          </div>` : ''}

          ${noticeHTML ? `
          <div class="section-card">
            <div class="section-card-header">📌 注意事項</div>
            <div class="section-card-body"><div class="notice-list">${noticeHTML}</div></div>
          </div>` : ''}

          ${hasForm
            ? `<a href="${e['表單連結']}" target="_blank" class="btn-register">前往報名表單 →</a>
               <p class="register-note">點擊後將開啟報名表單<br>請填寫完整資料後送出</p>`
            : `<div class="btn-register" style="opacity:.5;cursor:default">報名尚未開放</div>`}
        </div>
      </div>`;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('event-content').style.display = 'block';
  }

  loadEvent();
</script>
</body>
</html>
