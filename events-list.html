<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>活動報名 — 華美光學人資系統</title>
  <link rel="stylesheet" href="style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      
      --accent: #f56a6a;
      --bg: #f8f9fa;
      --card-bg: #ffffff;
      --text-dark: #3d4449;
      --text-mid: #666;
      --text-light: #999;
      --border: #e8e8e8;
      
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text-dark); display: flex; min-height: 100vh; }

    
    
    
    
    
    
    
    
    
    
    
    
    
    

    
    
    
    
    
    
    
    
    .content { padding:32px; flex:1; }

    /* Hero */
    
    .events-hero::before { content:''; position:absolute; right:-60px; top:-60px; width:220px; height:220px; border-radius:50%; background:rgba(255,255,255,.06); }
    
    
    

    /* Filter */
    .list-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:12px; }
    .list-header h2 { font-size:15px; font-weight:700; color:var(--text-mid); }
    .filter-tabs { display:flex; gap:8px; flex-wrap:wrap; }
    .tab { padding:6px 16px; border-radius:30px; font-size:13px; font-weight:600; cursor:pointer; border:1.5px solid var(--border); background:var(--card-bg); color:var(--text-mid); transition:all .18s; }
    .tab:hover { border-color:var(--accent); color:var(--accent); }
    .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }

    .section-label { font-size:12px; font-weight:700; color:var(--text-light); text-transform:uppercase; letter-spacing:.08em; margin-bottom:12px; margin-top:20px; display:flex; align-items:center; gap:8px; }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* Active grid - 3 col */
    .events-grid { display:flex; flex-direction:row; flex-wrap:wrap; gap:16px; width:100%; }

    .event-card { background:var(--card-bg); border-radius:12px; border:1px solid var(--border); overflow:hidden; transition:all .2s; text-decoration:none; color:inherit; display:inline-flex; flex-direction:column; cursor:pointer; width:300px; flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,.06); }
    .event-card:hover { box-shadow:0 6px 20px rgba(0,0,0,.1); transform:translateY(-2px); }

    .event-poster { width:100%; min-height:120px; background:#f0f1f5; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .event-poster img { width:100%; height:auto; object-fit:contain; display:block; }
    .event-poster.no-img { background:linear-gradient(135deg,#f5f4f0,#e4e2de); }
    .poster-placeholder { text-align:center; color:var(--text-light); padding:20px; }
    .poster-placeholder .pi { font-size:28px; display:block; margin-bottom:6px; }
    .poster-placeholder span { font-size:11px; }
    .poster-status { position:absolute; top:8px; left:8px; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; }
    .poster-status.open { background:#27ae60; color:#fff; }
    .poster-status.soon { background:#f0a500; color:#fff; }
    .poster-status.closed { background:rgba(0,0,0,.5); color:#fff; }

    .event-card-body { padding:12px 14px; flex:1; display:flex; flex-direction:column; }
    .event-card-tag { font-size:11px; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
    .event-card-title { font-size:15px; font-weight:800; margin-bottom:8px; line-height:1.3; }
    .event-card-meta { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
    .meta-row { display:flex; align-items:center; gap:5px; font-size:13px; color:var(--text-mid); }
    .event-card-footer { margin-top:auto; padding-top:10px; border-top:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .btn-card { display:inline-flex; align-items:center; gap:4px; background:var(--accent); color:#fff; font-size:12px; font-weight:700; padding:6px 14px; border-radius:20px; text-decoration:none; transition:all .18s; border:none; cursor:pointer; }
    .btn-card:hover { background:#ff7f7f; }
    .btn-card.disabled { background:var(--border); color:var(--text-light); pointer-events:none; }
    .event-date-chip { font-size:11px; color:var(--text-light); }

    /* Past grid - 4 col */
    .past-grid { display:flex; flex-wrap:wrap; gap:14px; max-width:948px; margin:0 auto; }
    .past-card { background:var(--card-bg); border-radius:10px; border:1px solid var(--border); overflow:hidden; opacity:.7; transition:opacity .2s; width:220px; flex-shrink:0; }
    .past-card:hover { opacity:1; }
    .past-poster { width:100%; min-height:100px; background:#f0f1f5; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; filter:grayscale(40%); }
    .past-poster img { width:100%; height:auto; object-fit:contain; }
    .past-poster.no-img { background:linear-gradient(135deg,#f0f1f5,#e4e2de); min-height:100px; }
    .past-ended { position:absolute; inset:0; background:rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; }
    .past-ended span { background:rgba(0,0,0,.6); color:#fff; font-size:10px; font-weight:700; padding:3px 10px; border-radius:20px; }
    .past-card-body { padding:10px 12px; }
    .past-card-title { font-size:12px; font-weight:700; margin-bottom:3px; }
    .past-card-date { font-size:10px; color:var(--text-light); }

    .loading { text-align:center; padding:60px; color:var(--text-light); }
    .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .empty-state { text-align:center; padding:40px; color:var(--text-light); }
    .empty-state .ei { font-size:40px; display:block; margin-bottom:10px; }

    

    
    @media (max-width:900px) { #sidebar{transform:translateX(-100%)} #sidebar.open{transform:translateX(0)} #sidebar-close{display:block!important} #main{margin-left:0} .menu-toggle{display:block} .event-card{width:calc(50% - 8px)} .past-card{width:calc(50% - 7px)} }
    @media (max-width:560px) { .content{padding:20px 16px} .event-card{width:100%} .past-card{width:calc(50% - 7px)} .hero-icon{display:none} }
  
    .page-hero {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 24px;
      height: 120px;
      width: 100%;
    }
    .page-hero-bg {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      width: 100%;
      height: 100%;
    }
    .page-hero-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.15);
    }
    .page-hero-content {
      position: relative;
      z-index: 2;
      padding: 0 40px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .page-hero-title {
      font-size: 22px;
      font-weight: 900;
      color: #2c4a6e;
      margin-bottom: 4px;
      text-shadow: 0 1px 3px rgba(255,255,255,.6);
    }
    .page-hero-desc {
      font-size: 13px;
      color: #4a6080;
      font-weight: 500;
    }
  
    /* Layout fix */
    body { display:flex; min-height:100vh; }
    #main { margin-left:var(--sidebar-width,260px); flex:1; display:flex; flex-direction:column; min-height:100vh; }
    @media (max-width:900px) { #main { margin-left:0; } }

  </style>
</head>
<body>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>
<aside id="sidebar">
  <div class="sidebar-header">
    <div class="logo-icon">🏢</div>
    <div class="logo-text">華美光學<span class="logo-sub">人資入口網站</span></div>
    <button onclick="toggleSidebar()" id="sidebar-close">✕</button>
  </div>
  <nav>
    <div class="nav-section-label">主選單</div>
    <a class="nav-item " href="home.html"><span class="icon">🏠</span> 首頁總覽</a>
    <div class="nav-section-label">學習與測驗</div>
    <a class="nav-item " href="quiz.html"><span class="icon">📝</span> 測驗專區</a>
    <a class="nav-item" href="#"><span class="icon">🎓</span> 教育訓練</a>
    <div class="nav-section-label">資料與公告</div>
    <a class="nav-item " href="docs.html"><span class="icon">📁</span> 文件宣導</a>
    <a class="nav-item active" href="events-list.html"><span class="icon">🎉</span> 活動報名</a>
    <a class="nav-item " href="notice.html"><span class="icon">📢</span> 最新公告</a>
    <div class="nav-section-label">系統整合</div>
    <a class="nav-item " href="links.html"><span class="icon">🔗</span> 相關系統連結</a>
  </nav>
  <div class="sidebar-footer">© 2025 華美光學　人資部</div>
</aside>

<div id="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div>
        <div class="topbar-title">活動報名</div>
        <div class="breadcrumb"><a href="home.html">首頁</a> › 活動報名</div>
      </div>
    </div>
    <div class="topbar-avatar">HR</div>
  </header>
  <main class="content">
    <div class="page-hero">
      <div class="page-hero-bg" style="background-image:url('https://lh3.googleusercontent.com/d/1g2lM1KL93953P0SiXsD13msOdHyyajIJ')"></div>
      <div class="page-hero-overlay"></div>
      <div class="page-hero-content">
        <div class="page-hero-title">🎉 活動報名</div>
        <div class="page-hero-desc">參與公司活動，讓我們一起創造美好回憶！</div>
      </div>
    </div>

    <div class="list-header">
      <h2>所有活動</h2>
      <div class="filter-tabs">
        <div class="tab active" onclick="filterEvents('all',this)">全部</div>
        <div class="tab" onclick="filterEvents('open',this)">報名中</div>
        <div class="tab" onclick="filterEvents('soon',this)">即將開始</div>
        <div class="tab" onclick="filterEvents('closed',this)">已截止</div>
      </div>
    </div>

    <div id="events-loading" class="loading"><div class="spinner"></div><p>載入中…</p></div>

    <div id="active-section" style="display:none">
      <div class="section-label">進行中活動</div>
      <div class="events-grid" id="active-grid"></div>
      <div id="active-empty" class="empty-state" style="display:none"><span class="ei">🎉</span><p>目前沒有進行中的活動</p></div>
    </div>

    <div id="past-section" style="display:none">
      <div class="section-label">歷史活動</div>
      <div class="past-grid" id="past-grid"></div>
    </div>
  </main>
</div>

<script src="sheets-config.js"></script>
<script>
  function toggleSidebar() {
    const s=document.getElementById('sidebar');
    const o=document.getElementById('sidebar-overlay');
    const c=document.getElementById('sidebar-close');
    const open=s.classList.toggle('open');
    o.style.display=open?'block':'none';
    if(c) c.style.display=open?'block':'none';
  }

  let allEvents=[];

  async function loadEvents() {
    const rows = await fetchSheet(HRCONFIG.SHEETS.EVENTS);
    allEvents = rows.filter(r => r['活動名稱']);
    document.getElementById('events-loading').style.display='none';
    renderEvents('all');
  }

  function renderEvents(filter) {
    const activeGrid=document.getElementById('active-grid');
    const pastGrid=document.getElementById('past-grid');
    const activeSection=document.getElementById('active-section');
    const pastSection=document.getElementById('past-section');
    const activeEmpty=document.getElementById('active-empty');
    activeGrid.innerHTML=''; pastGrid.innerHTML='';

    const active=allEvents.filter(e=>e['狀態']!=='已結束');
    const past=allEvents.filter(e=>e['狀態']==='已結束');

    const filtered = filter==='all' ? active : active.filter(e=>{
      if(filter==='open') return e['狀態']==='報名中';
      if(filter==='soon') return e['狀態']==='即將開始';
      if(filter==='closed') return e['狀態']==='已截止';
      return true;
    });

    if(filtered.length===0){
      activeEmpty.style.display='block';
      activeGrid.style.display='none';
    } else {
      activeEmpty.style.display='none';
      activeGrid.style.display='flex';
      filtered.forEach(e=>activeGrid.appendChild(buildActiveCard(e)));
    }
    activeSection.style.display='block';

    if((filter==='all'||filter==='closed')&&past.length>0){
      past.forEach(e=>pastGrid.appendChild(buildPastCard(e)));
      pastSection.style.display='block';
    } else {
      pastSection.style.display='none';
    }
  }

  function buildActiveCard(e) {
    const statusMap={'報名中':'open','即將開始':'soon','已截止':'closed'};
    const statusCls=statusMap[e['狀態']]||'open';
    const statusLabel=e['狀態']||'報名中';
    const hasPoster=e['海報連結']&&e['海報連結'].trim();
    const isDisabled=e['狀態']==='已截止';
    const link=e['活動頁連結']?e['活動頁連結']:'event-detail.html?event='+encodeURIComponent(e['活動名稱']);
    const date=formatSheetDate(e['日期'])||e['日期']||'日期待定';

    const card=document.createElement('a');
    card.className='event-card';
    card.href=link;
    card.innerHTML=`
      <div class="event-poster${hasPoster?'':' no-img'}">
        ${hasPoster?`<img src="${e['海報連結']}" alt="${e['活動名稱']}" onerror="this.parentElement.classList.add('no-img');this.remove()">`
        :`<div class="poster-placeholder"><span class="pi">🎉</span><span>海報製作中</span></div>`}
        <span class="poster-status ${statusCls}">● ${statusLabel}</span>
      </div>
      <div class="event-card-body">
        <div class="event-card-tag">${e['類別']||'公司活動'}</div>
        <div class="event-card-title">${e['活動名稱']}</div>
        <div class="event-card-meta">
          <div class="meta-row">📅 ${date}</div>
          <div class="meta-row">🕙 ${e['時間']||'時間待定'}</div>
          <div class="meta-row">📍 ${e['地點']||'地點待定'}</div>
        </div>
        <div class="event-card-footer">
          <span class="btn-card${isDisabled?' disabled':''}">${isDisabled?'報名已截止':'立即報名 →'}</span>
          <span class="event-date-chip">${e['報名截止日']?'截止：'+e['報名截止日']:'名額有限'}</span>
        </div>
      </div>`;
    return card;
  }

  function buildPastCard(e) {
    const hasPoster=e['海報連結']&&e['海報連結'].trim();
    const date=formatSheetDate(e['日期'])||e['日期']||'';
    const card=document.createElement('div');
    card.className='past-card';
    card.innerHTML=`
      <div class="past-poster${hasPoster?'':' no-img'}">
        ${hasPoster?`<img src="${e['海報連結']}" alt="${e['活動名稱']}" onerror="this.parentElement.classList.add('no-img');this.remove()">`:''}
        <div class="past-ended"><span>已結束</span></div>
      </div>
      <div class="past-card-body">
        <div class="past-card-title">${e['活動名稱']}</div>
        <div class="past-card-date">${date} · 已結束</div>
      </div>`;
    return card;
  }

  function filterEvents(type,el) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    renderEvents(type);
  }

  loadEvents();
</script>
</body>
</html>
